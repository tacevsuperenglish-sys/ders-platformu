// ÖĞRENCİ PARMAK KALDIRMA SİSTEMİ
// ====================================================================
let firebaseRaisedHands = {};

function applyRaisedHands(raisedHands) {
  firebaseRaisedHands = raisedHands || {};

  // Tüm öğrenci kutularına işaret koy/kaldır
  participantBoxes.forEach((entry) => {
    if (entry.role !== 'student') return;
    const isRaised = firebaseRaisedHands[entry.name] === true;
    entry.box.classList.toggle('hand-raised', isRaised);
  });

  // Kendi durumumu butona yansıt
  if (state.role === 'student') {
    const myBtn = document.getElementById('raise-hand-btn-student');
    if (myBtn) {
      const isRaised = firebaseRaisedHands[state.name] === true;
      myBtn.classList.toggle('raised', isRaised);
      myBtn.innerHTML = isRaised
        ? '<i class="fa-solid fa-hand-point-up"></i>'
        : '<i class="fa-regular fa-hand-point-up"></i>';
    }
  }
}

// Öğrenci parmak kaldırma butonu
document.getElementById('raise-hand-btn-student').onclick = async () => {
  if (state.role !== 'student' || !dbRoomRef) return;
  const { update } = window.fb;
  const isRaised = firebaseRaisedHands[state.name] === true;
  await update(dbRoomRef, {
    [`raisedHands/${state.name}`]: !isRaised
  });
};

// Öğretmen, parmak kaldırmış öğrenciye söz verince parmağı indir
async function autoLowerHandWhenSelected(name) {
  if (firebaseRaisedHands[name] === true && dbRoomRef) {
    const { update } = window.fb;
    await update(dbRoomRef, { [`raisedHands/${name}`]: false });
  }
}


// ====================================================================
// SÖZ VERME SİSTEMİ - Aktif Öğrenci
// ====================================================================

// Öğretmen söz butonuna bastı
async function toggleStudentTurn(identity, name) {
  if (state.role !== 'teacher') return;
  if (!dbRoomRef) return;

  const { update } = window.fb;

  // Şu an bu öğrenci aktif mi? → kapat (toggle)
  if (currentActiveStudent && currentActiveStudent.name === name) {
    await update(dbRoomRef, { activeStudent: null });
  } else {
    await update(dbRoomRef, { activeStudent: { name: name, since: Date.now() } });
    // Söz verirken parmağı otomatik indir
    autoLowerHandWhenSelected(name);
  }
}

// Firebase'den gelen activeStudent'ı UI'a uygula (HERKES için)
function applyActiveStudent(activeStudent) {
  currentActiveStudent = activeStudent;

  // Önce tüm kutulardan active-student sınıfını kaldır
  document.querySelectorAll('.cam-wrap').forEach(box => {
    box.classList.remove('active-student');
    const btn = box.querySelector('.raise-hand-btn');
    if (btn) btn.classList.remove('active');
  });

  // Yeni aktif öğrenciye sınıf ekle
  if (activeStudent && activeStudent.name) {
    participantBoxes.forEach((entry) => {
      if (entry.name === activeStudent.name && entry.role === 'student') {
        entry.box.classList.add('active-student');
        const btn = entry.box.querySelector('.raise-hand-btn');
        if (btn) btn.classList.add('active');
      }
    });
  }

  // Kilit varsa: bu kullanıcı aktif öğrenci mi? → etkinliği aç
  refreshActivityLock();
}

// ====================================================================
// ETKİNLİK KİLİDİ
// ====================================================================
function applyActivityLock(locked) {
  activityLocked = locked;
  refreshActivityLock();

  // Kilit butonu görselini güncelle (sadece öğretmen görür)
  const btn = document.getElementById('lock-btn');
  if (!btn) return;
  if (locked) {
    btn.classList.add('locked');
    btn.innerHTML = '<i class="fa-solid fa-lock"></i>';
    btn.title = 'Kilit AÇIK — sadece aktif öğrenci tıklayabilir (kaldırmak için tıkla)';
  } else {
    btn.classList.remove('locked');
    btn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
    btn.title = 'Kilit KAPALI — herkes etkinliklere tıklayabilir (açmak için tıkla)';
  }
}

function refreshActivityLock() {
  const activityArea = document.getElementById('activity-area');
  if (!activityArea) return;

  // Öğretmen her zaman tıklayabilir
  if (state.role === 'teacher') {
    document.body.classList.remove('activity-locked');
    return;
  }

  // Kilit yok → herkes tıklayabilir
  if (!activityLocked) {
    document.body.classList.remove('activity-locked');
    activityArea.classList.remove('unlocked-for-me');
    return;
  }

  // Kilit var → sadece aktif öğrenci tıklayabilir
  document.body.classList.add('activity-locked');
  if (currentActiveStudent && currentActiveStudent.name === state.name) {
    activityArea.classList.add('unlocked-for-me');
  } else {
    activityArea.classList.remove('unlocked-for-me');
  }
}

// Öğretmen kilit butonuna bastı (basit, anında çalışır)

  if (state.role !== 'teacher' || !dbRoomRef) return;
  const { update } = window.fb;
  await update(dbRoomRef, { activityLocked: !activityLocked });
};

  toggleWhiteboard(!wbIsOpen);
};
