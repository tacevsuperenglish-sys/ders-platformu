<style>
  /* ============ STYLE GUIDE: TACEV Super English ============ */

  /* Custom scrollbar (style guide standard) */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Hero gradient (premium — login, header) */
  .hero-gradient {
    background: linear-gradient(45deg, #0075e5 0%, #eb0bc4 75%, #eb0bc4 100%);
  }

  /* Body background — marka renkleriyle dokulu, premium */
  body {
    min-height: 100vh;
    background-color: #f8fafc;
    background-image:
      /* Yumuşak renkli ışıklar — marka renklerinden esinli */
      radial-gradient(at 15% 20%, rgba(0, 117, 229, 0.12) 0px, transparent 50%),
      radial-gradient(at 85% 10%, rgba(235, 11, 196, 0.10) 0px, transparent 50%),
      radial-gradient(at 75% 85%, rgba(99, 102, 241, 0.10) 0px, transparent 50%),
      radial-gradient(at 20% 90%, rgba(168, 85, 247, 0.08) 0px, transparent 50%),
      /* İnce ızgara doku */
      linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    background-attachment: fixed;
  }

  /* Role tag'leri (RBAC) */
  .tag-yonetici { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
  .tag-asistan  { background-color: #e0f2fe; color: #075985; border: 1px solid #38bdf8; }
  .tag-veli     { background-color: #dcfce7; color: #166534; border: 1px solid #4ade80; }

  /* Loader (style guide standard) */
  .loader {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #4f46e5;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== LAYOUT VARYASYONLARI =====
     A = dikey sağ kolon (varsayılan)
     B = sağ kolonda 2x2 grid
     C = üstte yatay şerit
     D = dikey + konuşan büyür (akıllı)
  ============================== */

  /* Layout A — sağ kolon, dikey (varsayılan) */
  .layout-a .app-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header header"
      "main cameras"
      "footer cameras";
    height: 100vh;
    gap: 16px;
    padding: 16px;
  }
  .layout-a .cameras {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }
  .layout-a .cam-wrap {
    flex: 1 1 0;
    min-height: 180px;
  }




  /* Mobil — kameralar üstte yatay */
  @media (max-width: 768px) {
    .layout-a .app-grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr auto;
      grid-template-areas:
        "header"
        "cameras"
        "main"
        "footer";
    }
    .layout-a .cameras {
      flex-direction: row;
      height: 140px;
    }
    .cam-wrap { min-height: 0 !important; height: 100%; }
  }

  /* ===== KONUŞAN PARILTISI ===== */
  @keyframes speakingGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217, 70, 239, 0.7), 0 8px 24px rgba(67, 56, 202, 0.15); }
    50%      { box-shadow: 0 0 0 8px rgba(217, 70, 239, 0.0), 0 8px 24px rgba(67, 56, 202, 0.15); }
  }
  .cam-wrap.speaking {
    border-color: #d946ef !important;
    animation: speakingGlow 1.5s ease-in-out infinite;
  }



  /* Kameralar */
  .cam-wrap {
    background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 2px solid white;
    box-shadow: 0 8px 24px rgba(67, 56, 202, 0.15), 0 2px 6px rgba(235, 11, 196, 0.08);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  /* Sıralama: öğretmen → aktif öğrenci → diğerleri */
  .cam-wrap[data-role="teacher"] { order: -10; }
  .cam-wrap[data-role="student"] { order: 0; }
  .cam-wrap.active-student { order: -5; }

  /* AKTİF ÖĞRENCİ — KALIN yeşil çerçeve + glow */
  @keyframes activeGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6), 0 8px 24px rgba(16, 185, 129, 0.3); }
    50%      { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0), 0 8px 24px rgba(16, 185, 129, 0.3); }
  }
  .cam-wrap.active-student {
    border-color: #10b981 !important;
    border-width: 6px !important;
    animation: activeGlow 2s ease-in-out infinite;
  }

  /* SÖZ VERME BUTONU (sadece öğretmen görür, öğrenci kutularında) */
  .raise-hand-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.95);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transition: all 0.2s;
    color: #4338ca;
    font-size: 14px;
  }
  .raise-hand-btn:hover {
    transform: scale(1.1);
    background: #eef2ff;
  }
  .raise-hand-btn.active {
    background: #10b981;
    color: white;
  }
  /* Buton sadece öğretmen görürken öğrenci kutusunda görünür */
  body.is-teacher .cam-wrap[data-role="student"] .raise-hand-btn { display: flex; }
  body:not(.is-teacher) .raise-hand-btn { display: none; }
  body.is-teacher .cam-wrap[data-role="teacher"] .raise-hand-btn { display: none; }

  /* KİLİT BUTONU (öğretmen kontrolünde) */
  #lock-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #eef2ff;
    color: #4f46e5;
    border: none;
    cursor: pointer;
    display: none; /* JS açar */
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  #lock-btn:hover { background: #e0e7ff; }
  #lock-btn.locked {
    background: #fef2f2;
    color: #dc2626;
  }

  /* PASİF DURUM — sadece aktif öğrenci etkileşebilir, görsel olarak hiçbir şey değişmez */
  body.activity-locked #activity-area:not(.unlocked-for-me) {
    pointer-events: none;
  }

  /* ===== BEYAZ TAHTA ===== */
  #whiteboard-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: none;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.2);
  }
  #whiteboard-overlay.open {
    display: flex;
    animation: wbPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #whiteboard-overlay.closing {
    display: flex;
    animation: wbClose 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes wbPop {
    0% { transform: scale(0.85); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes wbClose {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.85); opacity: 0; }
  }

  /* Kalem/silgi önizleme çemberi */
  #wb-cursor-preview {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(67, 56, 202, 0.6);
    background: rgba(67, 56, 202, 0.1);
    pointer-events: none;
    z-index: 6;
    display: none;
    transform: translate(-50%, -50%);
  }

  /* Metin kutusu OK butonu */
  .wb-textbox-ok {
    position: absolute;
    top: -14px;
    right: -14px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #10b981;
    color: white;
    border: 2px solid white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .wb-textbox-ok:hover { background: #059669; transform: scale(1.1); }
  .wb-textbox-wrapper {
    position: absolute;
    z-index: 5;
  }
  .wb-textbox.locked-text {
    cursor: move;
    resize: none;
    border-style: solid;
  }

  /* Sol araç paneli */
  .wb-toolbar {
    width: 72px;
    background: linear-gradient(180deg, #1e1b4b, #4338ca);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .wb-tool {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .wb-tool:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .wb-tool.active { background: white; color: #4338ca; }
  /* Tümünü sil butonu sadece öğretmende */
  body:not(.is-teacher) .wb-tool[data-tool="clear"] { display: none; }

  .wb-divider { width: 40px; height: 1px; background: rgba(255,255,255,0.2); margin: 4px 0; flex-shrink: 0; }

  /* Renk seçiciler */
  .wb-color {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .wb-color:hover { transform: scale(1.15); }
  .wb-color.active { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.5); }

  /* Kalınlık göstergesi */
  .wb-thickness {
    width: 48px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.12);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .wb-thickness:hover { background: rgba(255,255,255,0.25); }
  .wb-thickness.active { background: white; }
  .wb-thickness .dot { background: #4338ca; border-radius: 50%; }
  .wb-thickness.active .dot { background: #4338ca; }
  .wb-thickness:not(.active) .dot { background: white; }

  /* Çizim alanı */
  .wb-canvas-area {
    flex: 1;
    position: relative;
    background: #fdfdfd;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.06) 1px, transparent 1px);
    background-size: 24px 24px;
    overflow: hidden;
  }
  #wb-canvas { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }

  /* Metin kutuları */
  .wb-textbox {
    position: absolute;
    min-width: 60px;
    min-height: 30px;
    border: 2px dashed #6366f1;
    background: rgba(255,255,255,0.8);
    padding: 4px 8px;
    font-size: 20px;
    font-weight: 600;
    color: #1e1b4b;
    outline: none;
    border-radius: 6px;
    cursor: move;
    overflow: visible;
    white-space: nowrap;
  }
  .wb-textbox:focus { border-style: solid; }

  /* Kapat butonu (sağ üst) */
  .wb-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(239, 68, 68, 0.9);
    color: white;
    border: none;
    cursor: pointer;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  .wb-close:hover { background: #dc2626; transform: scale(1.05); }

  /* Beyaz tahta butonu (alt panel) */
  #whiteboard-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #eef2ff;
    color: #4f46e5;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  #whiteboard-btn:hover { background: #e0e7ff; }
  #whiteboard-btn.active { background: #4f46e5; color: white; }

  .cam-wrap video { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 1; }
  .cam-wrap.no-video video { display: none; }

  /* Avatar placeholder — kamera yoksa gösterilen */
  .cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 0;
    color: white;
  }
  .cam-wrap:not(.no-video) .cam-placeholder { display: none; }

  .cam-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(45deg, #0075e5, #eb0bc4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 24px;
    color: white;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    text-transform: uppercase;
  }
  /* Küçük kutular için avatar boyutu küçülsün */

  /* Sağ üst köşedeki durum göstergeleri (kamera & mikrofon kapalı) */
  .cam-status-indicators {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 4;
  }
  .cam-status-icon {
    width: 28px;
    height: 28px;
    background: rgba(239, 68, 68, 0.95);
    color: white;
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .cam-wrap.no-video .cam-status-icon.cam-off-icon { display: flex; }
  .cam-wrap.mic-muted .cam-status-icon.mic-off-icon { display: flex; }

  /* ===== YILDIZ ROZETİ (kamera sağ üst) ===== */
  .cam-star-badge {
    position: absolute;
    bottom: 42px;
    left: 10px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: white;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 800;
    display: none;
    align-items: center;
    gap: 3px;
    z-index: 5;
    box-shadow: 0 2px 8px rgba(251, 191, 36, 0.5);
  }
  .cam-star-badge.has-stars { display: flex; }
  .cam-star-badge .star-icon { font-size: 11px; }
  /* Yeni yıldız gelince zıplama */
  @keyframes starBump {
    0% { transform: scale(1); }
    40% { transform: scale(1.4) rotate(-8deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .cam-star-badge.bump { animation: starBump 0.5s ease-out; }

  /* Haylazlık göstergesi (sadece öğretmen ekranında) */
  .cam-mischief-badge {
    position: absolute;
    bottom: 42px;
    right: 10px;
    background: rgba(220, 38, 38, 0.92);
    color: white;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 5;
    box-shadow: 0 2px 6px rgba(220, 38, 38, 0.4);
  }


  /* Uçan yıldız (verilince ekranda süzülen) */
  .flying-star {
    position: fixed;
    font-size: 40px;
    z-index: 9998;
    pointer-events: none;
    animation: flyStar 1s ease-out forwards;
  }
  @keyframes flyStar {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    30% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0.8) rotate(360deg); opacity: 0; }
  }

  /* Sağ tık menüsüne yıldız ver seçeneği zaten context-menu var, ona ekleyeceğiz */
  .context-menu-item.star-give { color: #f59e0b; }
  .context-menu-item.star-give:hover { background: #fffbeb; }
  .context-menu-item.mischief-give { color: #dc2626; }
  .context-menu-item.mischief-give:hover { background: #fef2f2; }

  /* Eski cam-noVideoIcon — geriye dönük uyumluluk için boş bırak */
  .cam-noVideoIcon { display: none !important; }

  .cam-label {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(30, 27, 75, 0.85);
    backdrop-filter: blur(8px);
    color: white;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    z-index: 3;
  }

  /* Etkinlik girdileri (boşluk doldurma) */
  .fill-input {
    display: inline-block;
    min-width: 120px;
    padding: 4px 12px;
    margin: 0 4px;
    background: #eef2ff;
    border: none;
    border-bottom: 2px solid #6366f1;
    border-radius: 8px 8px 0 0;
    color: #312e81;
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    transition: all 0.2s;
  }
  .fill-input:focus { outline: none; background: #e0e7ff; }
  .fill-input.correct {
    border-color: #10b981;
    background: #ecfdf5;
    color: #065f46;
  }
  .fill-input.wrong {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }

  /* Çoktan seçmeli */
  .choice-btn {
    transition: all 0.2s;
  }
  .choice-btn:hover {
    border-color: #6366f1;
    transform: translateX(4px);
    background: #eef2ff;
  }
  .choice-btn.selected {
    border-color: #6366f1;
    background: #eef2ff;
  }
  .choice-btn.correct {
    border-color: #10b981;
    background: #ecfdf5;
  }
  .choice-btn.wrong {
    border-color: #ef4444;
    background: #fef2f2;
  }

  /* True/False */
  .tf-btn { transition: all 0.2s; }
  .tf-btn:hover { transform: scale(1.02); }
  .tf-btn.selected-true {
    border-color: #10b981;
    background: #ecfdf5;
    color: #065f46;
  }
  .tf-btn.selected-false {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }

  /* Sürükle-bırak */
  .draggable {
    transition: all 0.15s;
    cursor: grab;
  }
  .draggable:active { cursor: grabbing; }
  .draggable.dragging { opacity: 0.4; }
  .drop-zone { transition: all 0.15s; }
  .drop-zone.over {
    border-color: #6366f1;
    background: #eef2ff;
  }
  .drop-zone.filled {
    border-style: solid;
    border-color: #10b981;
    background: #ecfdf5;
  }
  .drop-zone.wrong {
    border-color: #ef4444;
    background: #fef2f2;
  }

  /* Resme tıklama */
  .clickable-spot {
    position: absolute;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clickable-spot:hover {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.15);
  }
  .clickable-spot.clicked-correct {
    border-color: #10b981;
    background: rgba(16, 185, 129, 0.25);
  }
  .clickable-spot.clicked-wrong {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.25);
  }


  /* SAĞ TIK MENÜSÜ (öğretmen → öğrenci kamera/mic kontrolü) */
  .context-menu {
    position: fixed;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    padding: 6px;
    z-index: 1000;
    min-width: 220px;
    font-size: 14px;
  }

  /* ÖVGÜ SİSTEMİ — Konfeti + büyük başarı yazısı */

    z-index: 9999;
    overflow: hidden;
  }

  /* === RENK HAVUZLARI — sadece kelimeye uygulanır, emojiye değil === */
  /* 1. Altın/Sarı yıldız */
  .praise-text.color-gold .praise-word {
    background: linear-gradient(45deg, #fbbf24, #f59e0b, #fde047);

  }
  .praise-text.color-brand { filter: drop-shadow(0 4px 20px rgba(235, 11, 196, 0.5)); }

  /* 3. Klasik zümrüt yeşil (eski yeşil) */
  .praise-text.color-emerald .praise-word {
    background: linear-gradient(45deg, #059669, #10b981, #34d399);

    background-clip: text;
    color: transparent;
  }
  .praise-text.color-emerald { filter: drop-shadow(0 4px 20px rgba(16, 185, 129, 0.6)); }

  /* 4. TACEV mavisi */
  .praise-text.color-blue .praise-word {
    background: linear-gradient(45deg, #0075e5, #38bdf8, #0ea5e9);

    background-clip: text;
    color: transparent;
  }
  .praise-text.color-blue { filter: drop-shadow(0 4px 20px rgba(14, 165, 233, 0.7)); }

  /* 5. Sıcak mercan (Disneyland) */

  }

  /* Emoji - kendi renginde kalır, gradient uygulanmaz */
  .praise-emoji {

    color: initial;

    background: none;
    -webkit-background-clip: initial;
    background-clip: initial;
    filter: none;
  }

  .praise-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(60px, 12vw, 180px);

    z-index: 2;
  }
  @keyframes praisePop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(1.2) rotate(2deg); opacity: 1; }
    35% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    75% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); opacity: 0; }
  }

  /* === EFEKT 1: KONFETİ === */

    position: absolute;
    width: 12px;
    height: 12px;
    top: -20px;

  }
  @keyframes confettiFall {
    0% {
      transform: translateY(0) rotate(0deg) translateX(0);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) rotate(720deg) translateX(var(--drift, 0px));
      opacity: 0.7;
    }
  }

  /* === EFEKT 2: HAVAI FİŞEK === */
  .firework-burst {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
  }
  .firework-spark {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    transform-origin: center;
    animation: sparkBurst 1.2s ease-out forwards;
  }
  @keyframes sparkBurst {
    0% {
      transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0);
      opacity: 1;
    }
    100% {
      transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance));
      opacity: 0;
    }
  }
  /* Birden fazla patlama (zincirleme) için yardımcı */
  .firework-burst.delayed-1 { animation-delay: 0.3s; }
  .firework-burst.delayed-2 { animation-delay: 0.6s; }
  .firework-burst.delayed-3 { animation-delay: 0.9s; }

  /* === EFEKT 3: PARILTI/PIRILTI === */
  .sparkle {
    position: absolute;
    width: 20px;
    height: 20px;
    pointer-events: none;
    animation: sparkleSpin 1.5s ease-out forwards;
  }
  .sparkle::before, .sparkle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    background: white;
    border-radius: 2px;
    box-shadow: 0 0 8px 2px currentColor;
  }
  .sparkle::before {
    width: 100%;
    height: 2px;
    transform: translate(-50%, -50%);
  }
  .sparkle::after {
    width: 2px;
    height: 100%;
    transform: translate(-50%, -50%);
  }
  @keyframes sparkleSpin {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    30% { transform: scale(1) rotate(180deg); opacity: 1; }
    70% { transform: scale(1) rotate(540deg); opacity: 1; }
    100% { transform: scale(0) rotate(720deg); opacity: 0; }
  }

  /* Öğretmenin övgü butonları (alt panelde) */
  .praise-buttons {

  /* Öğrencinin kendi parmak butonu (alt panel) — sarı yanar */

</style>

// ====================================================================
// FIREBASE SENKRON
// ====================================================================
async function setupFirebase() {
  const { ref, onValue, set, get, update } = window.fb;
  dbRoomRef = ref(window.fb.db, `rooms/${state.room}`);

  if (state.role === 'teacher') {
    const snap = await get(dbRoomRef);
    if (!snap.exists()) {
      await set(dbRoomRef, { currentPage: 0, answers: {}, createdAt: Date.now() });
    }
  }

  // === PRESENCE: Ben odaya girdiğimi Firebase'e bildir ===
  myPresenceId = `${state.role}_${state.name}_${Date.now()}`;
  const presenceRef = ref(window.fb.db, `rooms/${state.room}/presence/${myPresenceId}`);
  await set(presenceRef, {
    name: state.name,
    role: state.role,
    joinedAt: Date.now()
  });

  // Sayfayı kapatınca Firebase'den sil
  window.addEventListener('beforeunload', () => {
    try { set(presenceRef, null); } catch(e) {}
  });

  // Periyodik "ben hala buradayım" sinyali - 3 saniyede bir (sık)
  setInterval(async () => {
    try {
      await update(presenceRef, { lastSeen: Date.now() });
    } catch (e) {
      console.warn('Heartbeat hatası:', e.message);
    }
  }, 3000);

  // === PRESENCE DURUMU - cached snapshot ===
  let currentPresenceData = {};

  // Presence değiştikçe cached snapshot'ı güncelle
  const presenceListRef = ref(window.fb.db, `rooms/${state.room}/presence`);
  onValue(presenceListRef, (snap) => {
    currentPresenceData = snap.val() || {};
    refreshPresenceBoxes();
  });

  // ÖNEMLİ: Aynı zamanda kendi kendine düzenli aralıkta kontrol et
  // (Çünkü "ayrılma" zaman bazlı, ve onValue tetiklenmez)
  setInterval(refreshPresenceBoxes, 4000);

  function refreshPresenceBoxes() {
    const presence = currentPresenceData;
    const activeIds = new Set();
    const now = Date.now();
    const TIMEOUT_MS = 20000; // 20 saniye - heartbeat 3sn, bol bol pay var

    Object.entries(presence).forEach(([id, info]) => {
      if (!info) return;
      const lastSeen = info.lastSeen || info.joinedAt;
      if (now - lastSeen < TIMEOUT_MS) {
        activeIds.add(id);
        if (!participantBoxes.has(id)) {
          console.log('👤 Yeni katılımcı (Firebase):', id, info);
          createCameraBox(id, info.role, info.name);
          // YENİ: LiveKit'te bu kişinin track'leri varsa onlara bağlan
          attachExistingLiveKitTracksFor(info.name, info.role);
        }
      }
    });

    // Aktif olmayanları kaldır
    participantBoxes.forEach((entry, id) => {
      if (!activeIds.has(id)) {
        console.log('👋 Ayrılan katılımcı:', id);
        removeCameraBox(id);
      }
    });
  }

  // === ANA OYUN STATE DİNLE (sayfa, cevaplar, layout) ===
  onValue(dbRoomRef, (snap) => {
    const data = snap.val();
    if (!data) return;
    if (data.currentPage !== undefined && data.currentPage !== state.currentPage) {
      state.currentPage = data.currentPage;
      renderActivity();
    }
    if (data.answers && data.answers[state.currentPage]) {
      state.answers[state.currentPage] = data.answers[state.currentPage];
      applyAnswerToUI(state.currentPage, data.answers[state.currentPage]);
    }
    // Aktif öğrenci değişikliği
    applyActiveStudent(data.activeStudent || null);
    // Etkinlik kilidi değişikliği
    applyActivityLock(data.activityLocked || false);
    // Force kamera/mic durumları (öğretmen yönetimi)
    applyForceStates(data.forceStates || {});
    // Parmak kaldıran öğrenciler
    applyRaisedHands(data.raisedHands || {});
    // Övgü mesajı (konfeti animasyonu)
    applyPraise(data.praise);
    // Beyaz tahta durumu (açık/kapalı)
    applyWhiteboardState(data.whiteboardOpen === true);
    // Beyaz tahta çizim olayı
    applyWhiteboardEvent(data.whiteboardEvent);
    // Yıldızlar
    applyStars(data.stars || {});
    // Haylazlık (sadece öğretmen görür)
    applyMischief(data.mischief || {});
  });
}

// ====================================================================
// LIVEKIT VIDEO
// ====================================================================
let lkRoom = null;
let micEnabled = true;
let camEnabled = true;

async function setupVideo() {
  // ===== ADIM 0: Kendi kutum Firebase presence sistemi ile otomatik oluşturulacak =====
  console.log('✓ Setup başladı, Firebase presence aktif');

  // ===== ADIM 1: Token al =====
  let data;
  try {
    const tokenRes = await fetch('/api/livekit-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        room: `super-english-${state.room}`,
        identity: `${state.role}-${state.name}-${Date.now()}`,
        name: state.name
      })
    });
    data = await tokenRes.json();
    if (!data.token) throw new Error(data.error || 'Token alınamadı');
  } catch (e) {
    console.error('Token hatası:', e);
    showError('Derse bağlanılamadı (token): ' + e.message);
    return;
  }

  // ===== ADIM 2: Room oluştur ve event handler'ları bağla =====
  lkRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

  lkRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
    console.log('🎬 TrackSubscribed:', participant.identity, track.kind);
    if (track.kind === 'video') attachRemoteVideo(track, participant);
    else if (track.kind === 'audio') {
      const audioEl = track.attach();
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
    }
  });

  // YENİ: Karşı taraf yeni track yayınlarsa (örn kamera açtı) — abone olduğumuzdan emin ol
  lkRoom.on(LivekitClient.RoomEvent.TrackPublished, (publication, participant) => {
    console.log('📡 TrackPublished:', participant.identity, publication.kind);
    // Otomatik abone olmalı ama manuel garantiye al
    if (!publication.isSubscribed) {
      publication.setSubscribed(true);
    }
  });

  lkRoom.on(LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
    console.log('🆕 YENİ KATILIMCI:', participant.identity, participant.name);
    const isTeacher = participant.identity.startsWith('teacher-');
    const role = isTeacher ? 'teacher' : 'student';
    const name = participant.name || extractNameFromIdentity(participant.identity);
    createCameraBox(participant.identity, role, name);
  });
  
  // Data mesajı gelirse — özellikle 'hello' sinyali — kutuyu garantile
  lkRoom.on(LivekitClient.RoomEvent.DataReceived, (payload, participant) => {
    if (!participant) return;
    try {
      const msg = JSON.parse(new TextDecoder().decode(payload));
      if (msg.type === 'hello') {
        console.log('👋 Hello aldım:', participant.identity, msg);
        // Kutu yoksa oluştur
        if (!participantBoxes.has(participant.identity)) {
          const isTeacher = participant.identity.startsWith('teacher-');
          createCameraBox(participant.identity, msg.role || (isTeacher ? 'teacher' : 'student'), msg.name);
        }
      }
    } catch(e) { console.warn('Data parse hatası:', e); }
  });

  lkRoom.on(LivekitClient.RoomEvent.ParticipantDisconnected, (participant) => {
    removeCameraBox(participant.identity);
  });

  lkRoom.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
    if (track.kind === 'video') {
      const entry = participantBoxes.get(participant.identity);
      if (entry) {
        entry.box.querySelectorAll('video').forEach(v => v.remove());
        entry.box.classList.add('no-video');
      }
    }
  });

  // === KENDİ TRACK'IM yayından kalkarsa (örn. tarayıcı izni geri çekildi) ===
  lkRoom.on(LivekitClient.RoomEvent.LocalTrackUnpublished, (publication) => {
    console.log('🔻 Kendi track\'im kalktı:', publication.kind);
    if (publication.kind === 'video') {
      camEnabled = false;
      // Kendi Firebase kutuma placeholder uygula
      const entry = participantBoxes.get(myPresenceId);
      if (entry) {
        entry.box.querySelectorAll('video').forEach(v => v.remove());
        entry.box.classList.add('no-video');
      }
      // Buton görselini güncelle
      const camBtn = document.getElementById('toggle-cam');
      if (camBtn) {
        camBtn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
        camBtn.classList.add('bg-red-50', 'text-red-600');
        camBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
      }
    }
    if (publication.kind === 'audio') {
      micEnabled = false;
      const micBtn = document.getElementById('toggle-mic');
      if (micBtn) {
        micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
        micBtn.classList.add('bg-red-50', 'text-red-600');
        micBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
      }
    }
  });

  // Kendi track'im yeniden yayına girerse
  lkRoom.on(LivekitClient.RoomEvent.LocalTrackPublished, (publication) => {
    console.log('🔺 Kendi track\'im yayında:', publication.kind, 'track var mı?', !!publication.track);
    if (publication.kind === 'video') {
      camEnabled = true;
      // Track hazır mı? Eğer değilse biraz bekle
      const tryAttach = (attempts = 0) => {
        if (publication.track) {
          attachLocalVideo(publication.track);
        } else if (attempts < 10) {
          setTimeout(() => tryAttach(attempts + 1), 100);
        } else {
          console.warn('Track 1 saniye sonra hala hazır değil');
        }
      };
      tryAttach();
      const camBtn = document.getElementById('toggle-cam');
      if (camBtn) {
        camBtn.innerHTML = '<i class="fa-solid fa-video"></i>';
        camBtn.classList.remove('bg-red-50', 'text-red-600');
        camBtn.classList.add('bg-indigo-50', 'text-indigo-600');
      }
    }
    if (publication.kind === 'audio') {
      micEnabled = true;
      const micBtn = document.getElementById('toggle-mic');
      if (micBtn) {
        micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
        micBtn.classList.remove('bg-red-50', 'text-red-600');
        micBtn.classList.add('bg-indigo-50', 'text-indigo-600');
      }
    }
  });

  lkRoom.on(LivekitClient.RoomEvent.TrackMuted, (publication, participant) => {
    const entry = findBoxForParticipant(participant);
    if (!entry) return;
    if (publication.kind === 'video') {
      entry.box.classList.add('no-video');
      entry.box.querySelectorAll('video').forEach(v => v.remove());
    } else if (publication.kind === 'audio') {
      entry.box.classList.add('mic-muted');
    }
  });
  lkRoom.on(LivekitClient.RoomEvent.TrackUnmuted, (publication, participant) => {
    const entry = findBoxForParticipant(participant);
    if (!entry) return;
    if (publication.kind === 'video') {
      entry.box.classList.remove('no-video');
      // Video tekrar aç - track'i yeniden attach et!
      if (publication.track) {
        entry.box.querySelectorAll('video').forEach(v => v.remove());
        const videoEl = publication.track.attach();
        videoEl.style.width = '100%';
        videoEl.style.height = '100%';
        videoEl.style.objectFit = 'cover';
        videoEl.autoplay = true;
        videoEl.playsInline = true;
        entry.box.appendChild(videoEl);
      }
    } else if (publication.kind === 'audio') {
      entry.box.classList.remove('mic-muted');
    }
  });

  lkRoom.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
    document.querySelectorAll('.cam-wrap').forEach(b => b.classList.remove('speaking'));
    speakers.forEach(sp => {
      const entry = participantBoxes.get(sp.identity);
      if (entry) entry.box.classList.add('speaking');
    });
  });

  // ===== ADIM 3: Odaya bağlan =====
  try {
    await lkRoom.connect(data.wsUrl, data.token, { autoSubscribe: true });
    console.log('✓ LiveKit odasına bağlandı');
    console.log('Şu an odada olan diğer katılımcılar:', lkRoom.remoteParticipants.size);
    
    // KRİTİK: Bağlandığım anda diğerlerine "ben buradayım" sinyali yolla
    // Bu, kamera/mic izni olmasa bile çalışır
    try {
      const helloPayload = new TextEncoder().encode(JSON.stringify({ type: 'hello', name: state.name, role: state.role }));
      await lkRoom.localParticipant.publishData(helloPayload, { reliable: true });
      console.log('✓ Hello sinyali gönderildi');
    } catch (dataErr) {
      console.warn('Data publish hatası:', dataErr);
    }
  } catch (e) {
    console.error('Bağlantı hatası:', e);
    showError('Odaya bağlanılamadı: ' + e.message);
    return;
  }

  // ===== ADIM 4: Odadaki mevcut katılımcıları göster + ZATEN YAYINLANAN TRACK'LERİ AL =====
  lkRoom.remoteParticipants.forEach((participant) => {
    const isTeacher = participant.identity.startsWith('teacher-');
    const role = isTeacher ? 'teacher' : 'student';
    const name = participant.name || extractNameFromIdentity(participant.identity);
    createCameraBox(participant.identity, role, name);

    // ÖNEMLİ: Bu kişi zaten yayında olan track'leri varsa, onlara da bağlan
    participant.trackPublications.forEach((publication) => {
      console.log('🔍 Mevcut publication kontrol:', participant.identity, publication.kind, 'subscribed:', publication.isSubscribed);
      if (publication.track && publication.kind === 'video') {
        console.log('   → Mevcut video track\'i manuel bağlanıyor');
        attachRemoteVideo(publication.track, participant);
      } else if (publication.track && publication.kind === 'audio') {
        const audioEl = publication.track.attach();
        audioEl.style.display = 'none';
        document.body.appendChild(audioEl);
      }
    });
  });

  // ===== ADIM 5: Mikrofon dene (BAĞIMSIZ try/catch) =====
  try {
    await lkRoom.localParticipant.setMicrophoneEnabled(true);
    console.log('✓ Mikrofon açıldı');
    // Kendi kutumda mikrofonun açık olduğunu işaretle
    const entry = participantBoxes.get(myPresenceId);
    if (entry) entry.box.classList.remove('mic-muted');
  } catch (micErr) {
    console.warn('⚠ Mikrofon izni yok:', micErr.message);
    micEnabled = false;
    const micBtn = document.getElementById('toggle-mic');
    if (micBtn) {
      micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
      micBtn.classList.add('bg-red-50', 'text-red-600');
      micBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
    }
    // Kendi kutuma mic-muted ekle (kendim göreyim)
    const entry = participantBoxes.get(myPresenceId);
    if (entry) entry.box.classList.add('mic-muted');
  }

  // ===== ADIM 6: Kamera dene (BAĞIMSIZ try/catch) =====
  try {
    await lkRoom.localParticipant.setCameraEnabled(true);
    const pubs = Array.from(lkRoom.localParticipant.videoTrackPublications.values());
    if (pubs.length > 0 && pubs[0].track) attachLocalVideo(pubs[0].track);
    console.log('✓ Kamera açıldı');
  } catch (camErr) {
    console.warn('⚠ Kamera izni yok:', camErr.message);
    camEnabled = false;
    const camBtn = document.getElementById('toggle-cam');
    if (camBtn) {
      camBtn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
      camBtn.classList.add('bg-red-50', 'text-red-600');
      camBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
    }
    // Kutu zaten 'no-video' ile başladı, placeholder görünmeye devam edecek
  }

  console.log('🎉 Setup tamamlandı, derse hazır');
}

// ====================================================================
// participantBoxes: identity → { box, role, name } eşlemesi
const participantBoxes = new Map();

// Identity'den isim çıkar: "teacher-Ahmet-12345" → "Ahmet"
function extractNameFromIdentity(identity) {
  const parts = identity.split('-');
  if (parts.length >= 3) {
    return parts.slice(1, -1).join('-');
  }
  return identity;
}
// Bir LiveKit participant'ın hangi Firebase kutusuna ait olduğunu bul (isim eşleştirmesi)
function findBoxForParticipant(participant) {
  const isTeacher = participant.identity.startsWith('teacher-');
  const role = isTeacher ? 'teacher' : 'student';
  const name = participant.name || extractNameFromIdentity(participant.identity);
  for (const [id, entry] of participantBoxes) {
    if (entry.name === name && entry.role === role) return entry;
  }
  return null;
}


// Verilen isim+rol için LiveKit'te zaten yayında olan track'leri bul ve bağla
function attachExistingLiveKitTracksFor(name, role) {
  if (!lkRoom) return;
  lkRoom.remoteParticipants.forEach((participant) => {
    const isTeacher = participant.identity.startsWith('teacher-');
    const pRole = isTeacher ? 'teacher' : 'student';
    const pName = participant.name || extractNameFromIdentity(participant.identity);
    if (pName === name && pRole === role) {
      console.log('🔄 Mevcut LiveKit track\'leri taranıyor:', participant.identity);
      participant.trackPublications.forEach((publication) => {
        if (publication.track && publication.kind === 'video') {
          console.log('   → Video track manuel bağlanıyor');
          attachRemoteVideo(publication.track, participant);
        }
      });
    }
  });
}


// İsimden iki harf üret: "Ahmet Yılmaz" → "AY", "Ali" → "A"
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0][0].toUpperCase();
}

// Kutu oluştur — her zaman placeholder ile (kamera açılınca video üstüne gelir)
function createCameraBox(identity, role, name) {
  if (participantBoxes.has(identity)) return participantBoxes.get(identity).box;

  const box = document.createElement('div');
  box.className = 'cam-wrap no-video';
  box.dataset.identity = identity;
  box.dataset.role = role;
  box.dataset.name = name;

  // Kendi kutum mu? → my-box class'ı ekle (parmak rozeti sadece burada görünür)
  if (name === state.name && role === state.role) {
    box.classList.add('my-box');
  }

  // Söz verme butonu — sadece öğrenci kutularına, CSS sadece öğretmene gösterir
  if (role === 'student') {
    const handBtn = document.createElement('button');
    handBtn.className = 'raise-hand-btn';
    handBtn.title = 'Söz ver — bu öğrenci öne çıksın';
    handBtn.innerHTML = '<i class="fa-solid fa-hand-point-up"></i>';
    handBtn.onclick = (e) => {
      e.stopPropagation();
      toggleStudentTurn(identity, name);
    };
    box.appendChild(handBtn);
  }

  // Placeholder (avatar + isim)
  const placeholder = document.createElement('div');
  placeholder.className = 'cam-placeholder';
  placeholder.innerHTML = `
    <div class="cam-avatar">${getInitials(name)}</div>
    <div class="text-xs font-bold opacity-90">${role === 'teacher' ? 'Teacher ' + name : name}</div>
  `;
  box.appendChild(placeholder);

  // Durum göstergeleri (sağ üst — kamera ve mikrofon kapalı)
  const indicators = document.createElement('div');
  indicators.className = 'cam-status-indicators';
  indicators.innerHTML = `
    <div class="cam-status-icon mic-off-icon" title="Mikrofon kapalı"><i class="fa-solid fa-microphone-slash"></i></div>
    <div class="cam-status-icon cam-off-icon" title="Kamera kapalı"><i class="fa-solid fa-video-slash"></i></div>
  `;
  box.appendChild(indicators);

  // Yıldız rozeti (sadece öğrenci kutularında)
  if (role === 'student') {
    const starBadge = document.createElement('div');
    starBadge.className = 'cam-star-badge';
    starBadge.innerHTML = '<i class="fa-solid fa-star star-icon"></i> <span class="star-count">0</span>';
    box.appendChild(starBadge);
    // Mevcut yıldız sayısını uygula
    const count = (studentStars && studentStars[name]) || 0;
    updateStarBadge(box, count, false);
  }

  // Alt isim etiketi
  const label = document.createElement('span');
  label.className = 'cam-label';
  const icon = role === 'teacher' ? 'fa-chalkboard-user' : 'fa-user-graduate';
  const displayName = role === 'teacher' ? `Teacher ${name}` : name;
  label.innerHTML = `<i class="fa-solid ${icon} mr-1"></i> ${displayName}`;
  box.appendChild(label);

  document.getElementById('cameras-container').appendChild(box);
  participantBoxes.set(identity, { box, role, name });
  updateCameraLayout();

  // Aktif durumu uygula (Firebase'den okuduğumuz kişi bu mu?)
  if (currentActiveStudent && currentActiveStudent.name === name) {
    box.classList.add('active-student');
  }

  // ÖĞRETMEN SAĞ TIK MENÜSÜ — sadece öğrenci kutularında, öğretmenin tarayıcısında
  if (role === 'student') {
    box.addEventListener('contextmenu', (e) => {
      if (state.role !== 'teacher') return;
      e.preventDefault();
      openTeacherContextMenu(e.clientX, e.clientY, name);
    });
  }

  return box;
}

// Kutuyu sil (kişi ayrıldı)
function removeCameraBox(identity) {
  const entry = participantBoxes.get(identity);
  if (!entry) return;
  entry.box.remove();
  participantBoxes.delete(identity);
  updateCameraLayout();
}

// Layout C için: kamera sayısına göre CSS değişkenini güncelle
function updateCameraLayout() {
  const count = participantBoxes.size;
  document.getElementById('cameras-container').style.setProperty('--cam-count', count);
}

// Karşı tarafın videosunu doğru kutuya tak — isim eşleştirmesi ile
function attachRemoteVideo(track, participant) {
  console.log('📹 attachRemoteVideo çağrıldı:', participant.identity, 'track:', track.sid);

  const isTeacher = participant.identity.startsWith('teacher-');
  const role = isTeacher ? 'teacher' : 'student';
  const name = participant.name || extractNameFromIdentity(participant.identity);
  console.log('   → role:', role, 'name:', name);

  // Bu isme ait Firebase kutusunu bul (öncelikli)
  let targetBox = null;
  participantBoxes.forEach((entry, id) => {
    if (entry.name === name && entry.role === role) {
      targetBox = entry.box;
      console.log('   ✓ Firebase kutusu bulundu, id:', id);
    }
  });

  // Bulamazsan oluştur
  if (!targetBox) {
    console.log('   ⚠ Firebase kutusu bulunamadı, yenisi oluşturulacak');
    targetBox = createCameraBox(participant.identity, role, name);
  }

  // Eski videoları temizle, yenisini ekle
  targetBox.querySelectorAll('video').forEach(v => v.remove());
  const videoEl = track.attach();
  videoEl.style.width = '100%';
  videoEl.style.height = '100%';
  videoEl.style.objectFit = 'cover';
  videoEl.autoplay = true;
  videoEl.playsInline = true;
  targetBox.appendChild(videoEl);
  targetBox.classList.remove('no-video');
  console.log('   ✓ Video kutuya eklendi');
}

// Kendi video'nu kendi Firebase kutuna koy
function attachLocalVideo(track) {
  // Firebase kutuyu zaten oluşturmuş olmalı (myPresenceId ile)
  let targetBox = null;
  if (myPresenceId && participantBoxes.has(myPresenceId)) {
    targetBox = participantBoxes.get(myPresenceId).box;
  } else {
    // Yedek olarak oluştur
    targetBox = createCameraBox(myPresenceId || 'LOCAL', state.role, state.name);
  }
  targetBox.querySelectorAll('video').forEach(v => v.remove());
  const videoEl = track.attach();
  videoEl.muted = true;
  targetBox.appendChild(videoEl);
  targetBox.classList.remove('no-video');
}

document.getElementById('toggle-mic').onclick = async () => {

  btn.classList.toggle('text-red-600', !micEnabled);
  btn.classList.toggle('bg-indigo-50', micEnabled);

document.getElementById('toggle-cam').onclick = async () => {
  if (!lkRoom) return;
  const targetState = !camEnabled;
  console.log('🎛️ Toggle camera:', targetState ? 'AÇILIYOR' : 'KAPATILIYOR');

  try {
    await lkRoom.localParticipant.setCameraEnabled(targetState);
    camEnabled = targetState;
  } catch (e) {
    console.warn('Kamera değiştirilemedi:', e.name, e.message);
    camEnabled = false;
    showError('Kameraya erişilemedi. Tarayıcı izinlerini kontrol edin.');
  }

  // Buton görselini güncelle
  const btn = document.getElementById('toggle-cam');
  btn.innerHTML = camEnabled ? '<i class="fa-solid fa-video"></i>' : '<i class="fa-solid fa-video-slash"></i>';
  btn.classList.toggle('bg-red-50', !camEnabled);
  btn.classList.toggle('text-red-600', !camEnabled);
  btn.classList.toggle('bg-indigo-50', camEnabled);
  btn.classList.toggle('text-indigo-600', camEnabled);

  const entry = participantBoxes.get(myPresenceId);
  if (!entry) {
    console.warn('Kendi kutum bulunamadı:', myPresenceId);
    return;
  }

  if (!camEnabled) {
    // === KAPATMA ===
    entry.box.querySelectorAll('video').forEach(v => v.remove());
    entry.box.classList.add('no-video');
    console.log('✓ Kendi kutum: video kaldırıldı, placeholder aktif');
  } else {
    // === AÇMA ===
    // Track'i manuel bul, attach et (event'i bekleme!)
    // Birkaç deneme yap çünkü track hazır olmayabilir
    let attempts = 0;
    const tryAttach = () => {
      attempts++;
      const pubs = Array.from(lkRoom.localParticipant.videoTrackPublications.values());
      const pub = pubs.find(p => p.track && !p.track.isMuted);

      if (pub && pub.track) {
        // Track bulundu, attach et
        entry.box.querySelectorAll('video').forEach(v => v.remove());
        const videoEl = pub.track.attach();
        videoEl.muted = true;
        videoEl.autoplay = true;
        videoEl.playsInline = true;
        videoEl.style.width = '100%';
        videoEl.style.height = '100%';
        videoEl.style.objectFit = 'cover';
        entry.box.appendChild(videoEl);
        entry.box.classList.remove('no-video');
        console.log('✓ Kendi kameram açıldı, video elementi takıldı (deneme', attempts + ')');
      } else if (attempts < 20) {
        // Henüz hazır değil, 100ms sonra tekrar dene
        setTimeout(tryAttach, 100);
      } else {
        console.error('❌ Track 2 saniye sonra hala hazır değil');
      }
    };
    tryAttach();
  }
};
document.getElementById('leave-btn').onclick = async () => {

// ====================================================================
// ETKİNLİK OLAY DİNLEYİCİLERİ
// ====================================================================
function attachActivityListeners(page) {
  if (page.type === 'fill') {
    document.querySelectorAll('.fill-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const values = {};
        document.querySelectorAll('.fill-input').forEach(i => {
          values[i.dataset.blank] = i.value;
        });
        syncAnswer(state.currentPage, { type: 'fill', values });
      });
    });
  }

  if (page.type === 'multiple') {
    document.querySelectorAll('.choice-btn').forEach(c => {
      c.onclick = () => {
        const idx = parseInt(c.dataset.idx);
        syncAnswer(state.currentPage, { type: 'multiple', selected: idx, correct: page.correct });
      };
    });
  }

  if (page.type === 'truefalse') {
    document.querySelectorAll('.tf-btn').forEach(b => {
      b.onclick = () => {
        const val = b.dataset.val === 'true';
        syncAnswer(state.currentPage, { type: 'truefalse', selected: val, correct: page.correct, explanation: page.explanation });
      };
    });
  }

  if (page.type === 'match') {
    let dragged = null;
    document.querySelectorAll('.draggable').forEach(d => {
      d.ondragstart = () => { dragged = d; d.classList.add('dragging'); };
      d.ondragend = () => d.classList.remove('dragging');
    });
    document.querySelectorAll('.drop-zone').forEach(z => {
      z.ondragover = (e) => { e.preventDefault(); z.classList.add('over'); };
      z.ondragleave = () => z.classList.remove('over');
      z.ondrop = (e) => {
        e.preventDefault();
        z.classList.remove('over');
        if (!dragged) return;
        const droppedEn = dragged.dataset.en;
        const isCorrect = droppedEn === z.dataset.correctEn;
        const matches = state.answers[state.currentPage]?.matches || {};
        matches[z.dataset.tr] = { en: droppedEn, correct: isCorrect };
        syncAnswer(state.currentPage, { type: 'match', matches });
      };
    });
  }

  if (page.type === 'image') {
    document.querySelectorAll('.clickable-spot').forEach(s => {
      s.onclick = () => {
        const idx = parseInt(s.dataset.idx);
        const correct = s.dataset.correct === 'true';
        syncAnswer(state.currentPage, { type: 'image', clicked: idx, correct });
      };
    });
  }

  if (page.type === 'writing') {
    const ta = document.getElementById('writing-input');
    let typingTimer;
    ta.addEventListener('input', () => {
      const text = ta.value;
      document.getElementById('word-count').textContent = `${text.trim().split(/\s+/).filter(Boolean).length} kelime`;
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => syncAnswer(state.currentPage, { type: 'writing', text }), 400);
    });
  }
}

// ====================================================================
// CEVAPLARI UI'A UYGULA
// ====================================================================
function applyAnswerToUI(pageIndex, ans) {
  if (pageIndex !== state.currentPage) return;
  const page = LESSON[pageIndex];

  if (ans.type === 'fill') {
    Object.entries(ans.values).forEach(([k, v]) => {
      const inp = document.querySelector(`.fill-input[data-blank="${k}"]`);
      if (inp && inp.value !== v) inp.value = v;
      if (inp && v.trim()) {
        const correct = v.trim().toLowerCase() === page.answers[k].toLowerCase();
        inp.classList.toggle('correct', correct);
        inp.classList.toggle('wrong', !correct);
      }
    });
  }

  if (ans.type === 'multiple') {
    document.querySelectorAll('.choice-btn').forEach((c, i) => {
      c.classList.remove('selected', 'correct', 'wrong');
      if (i === ans.selected) {
        c.classList.add(i === ans.correct ? 'correct' : 'wrong');
      } else if (i === ans.correct && ans.selected !== ans.correct) {
        c.classList.add('correct');
      }
    });
  }

  if (ans.type === 'truefalse') {
    document.querySelectorAll('.tf-btn').forEach(b => {
      b.classList.remove('selected-true', 'selected-false');
      const val = b.dataset.val === 'true';
      if (val === ans.selected) {
        b.classList.add(ans.correct === val ? 'selected-true' : 'selected-false');
      }
    });
    const fb = document.getElementById('tf-feedback');
    const isCorrect = ans.selected === ans.correct;
    fb.className = 'p-4 rounded-xl text-sm font-bold ' +
      (isCorrect ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
                 : 'bg-red-50 text-red-700 border border-red-200');
    fb.innerHTML = isCorrect
      ? '<i class="fa-solid fa-circle-check mr-2"></i> Doğru!'
      : `<i class="fa-solid fa-circle-xmark mr-2"></i> Yanlış. ${ans.explanation || ''}`;
  }

  if (ans.type === 'match' && ans.matches) {
    Object.entries(ans.matches).forEach(([tr, info]) => {
      const zone = document.querySelector(`.drop-zone[data-tr="${tr}"]`);
      if (!zone) return;
      zone.innerHTML = `
        <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg font-bold text-sm">${info.en}</span>
        <i class="fa-solid fa-arrow-right text-gray-400"></i>
        <span class="text-gray-700 font-medium">${tr}</span>
      `;
      zone.classList.remove('filled', 'wrong');
      if (info.correct) zone.classList.add('filled');
      else {
        zone.classList.add('wrong', 'shake');
        setTimeout(() => zone.classList.remove('shake'), 400);
      }
    });
  }

  if (ans.type === 'image') {
    const spot = document.querySelector(`.clickable-spot[data-idx="${ans.clicked}"]`);
    if (spot) spot.classList.add(ans.correct ? 'clicked-correct' : 'clicked-wrong');
  }

  if (ans.type === 'writing') {
    const ta = document.getElementById('writing-input');
    if (!ta) return;
    // ÖNEMLİ: Şu an bu textarea'da yazıyorsam (odaktaysa), DOKUNMA!
    // Yoksa kendi yazdığım Firebase'den geri gelince imleç bozulur, harfler silinir
    if (document.activeElement === ta) return;
    // Sadece karşı taraf yazıyorsa güncelle
    if (ta.value !== ans.text) {
      ta.value = ans.text;
      const wc = document.getElementById('word-count');
      if (wc) wc.textContent = `${ans.text.trim().split(/\s+/).filter(Boolean).length} kelime`;
    }
  }
}

// ====================================================================
// BEYAZ TAHTA SİSTEMİ
// ====================================================================
let wbCanvas, wbCtx;
let wbDrawing = false;
let wbTool = 'pen';
let wbColor = '#1e1b4b';
let wbSize = 4;
let wbLastX = 0, wbLastY = 0;
let wbIsOpen = false;

// Undo/Redo geçmişi (canvas snapshot'ları)
let wbHistory = [];
let wbHistoryIndex = -1;
const WB_HISTORY_MAX = 30;

// Mevcut canvas durumunu geçmişe ekle
function pushWbHistory() {
  if (!wbCanvas) return;
  // İleri'deki geçmişi sil (yeni çizim yapıldıysa redo geçersiz)
  wbHistory = wbHistory.slice(0, wbHistoryIndex + 1);
  wbHistory.push(wbCanvas.toDataURL());
  if (wbHistory.length > WB_HISTORY_MAX) wbHistory.shift();
  wbHistoryIndex = wbHistory.length - 1;
}

// Belirli bir snapshot'ı canvas'a yükle ve karşıya yayınla
function restoreWbSnapshot(dataURL, broadcast) {
  const img = new Image();
  img.onload = () => {
    wbCtx.clearRect(0, 0, wbCanvas.width, wbCanvas.height);
    wbCtx.drawImage(img, 0, 0, wbCanvas.width, wbCanvas.height);
  };
  img.src = dataURL;
  if (broadcast) {
    broadcastWhiteboard({ type: 'snapshot', data: dataURL, w: wbCanvas.width, h: wbCanvas.height });
  }
}

function wbUndo() {
  if (wbHistoryIndex <= 0) {
    // İlk duruma (boş) dön
    if (wbHistoryIndex === 0) {
      wbHistoryIndex = -1;
      wbCtx.clearRect(0, 0, wbCanvas.width, wbCanvas.height);
      broadcastWhiteboard({ type: 'clear' });
    }
    return;
  }
  wbHistoryIndex--;
  restoreWbSnapshot(wbHistory[wbHistoryIndex], true);
}

function wbRedo() {
  if (wbHistoryIndex >= wbHistory.length - 1) return;
  wbHistoryIndex++;
  restoreWbSnapshot(wbHistory[wbHistoryIndex], true);
}

// Tahta açma/kapama (öğretmen kontrolünde, Firebase senkron)
function initWhiteboard() {
  wbCanvas = document.getElementById('wb-canvas');
  if (!wbCanvas) return;
  wbCtx = wbCanvas.getContext('2d');

  // Canvas boyutunu alanına göre ayarla
  resizeWhiteboardCanvas();
  window.addEventListener('resize', () => {
    if (wbIsOpen) resizeWhiteboardCanvas();
  });

  // === ARAÇLAR ===
  document.querySelectorAll('.wb-tool').forEach(btn => {
    btn.onclick = () => {
      const tool = btn.dataset.tool;
      if (tool === 'clear') {
        if (canUseWhiteboard()) {
          clearWhiteboard();
          pushWbHistory();
          broadcastWhiteboard({ type: 'clear' });
        }
        return;
      }
      if (tool === 'undo') {
        if (canUseWhiteboard()) wbUndo();
        return;
      }
      if (tool === 'redo') {
        if (canUseWhiteboard()) wbRedo();
        return;
      }
      // pen, eraser, text — araç seçimi
      wbTool = tool;
      document.querySelectorAll('.wb-tool').forEach(b => {
        if (['pen','eraser','text'].includes(b.dataset.tool)) b.classList.remove('active');
      });
      btn.classList.add('active');
    };
  });

  // === RENKLER ===
  document.querySelectorAll('.wb-color').forEach(c => {
    c.onclick = () => {
      wbColor = c.dataset.color;
      document.querySelectorAll('.wb-color').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      if (wbTool === 'eraser') { wbTool = 'pen'; document.querySelector('.wb-tool[data-tool="pen"]').classList.add('active'); document.querySelector('.wb-tool[data-tool="eraser"]').classList.remove('active'); }
    };
  });

  // === KALINLIK ===
  document.querySelectorAll('.wb-thickness').forEach(t => {
    t.onclick = () => {
      wbSize = parseInt(t.dataset.size);
      document.querySelectorAll('.wb-thickness').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    };
  });

  // === ÇİZİM OLAYLARI ===
  wbCanvas.addEventListener('pointerdown', wbPointerDown);
  wbCanvas.addEventListener('pointermove', wbPointerMove);
  wbCanvas.addEventListener('pointerup', wbPointerUp);
  wbCanvas.addEventListener('pointerleave', wbPointerUp);

  // === ÖNİZLEME ÇEMBERİ (kalem/silgi boyutu) ===
  const preview = document.getElementById('wb-cursor-preview');
  wbCanvas.addEventListener('pointermove', (e) => {
    if (wbTool === 'text' || !canUseWhiteboard()) {
      preview.style.display = 'none';
      return;
    }
    const rect = wbCanvas.getBoundingClientRect();
    const size = wbTool === 'eraser' ? wbSize * 5 : wbSize;
    preview.style.display = 'block';
    preview.style.left = (e.clientX - rect.left) + 'px';
    preview.style.top = (e.clientY - rect.top) + 'px';
    preview.style.width = size + 'px';
    preview.style.height = size + 'px';
    // Silgi farklı renkte
    if (wbTool === 'eraser') {
      preview.style.borderColor = 'rgba(239, 68, 68, 0.6)';
      preview.style.background = 'rgba(239, 68, 68, 0.1)';
    } else {
      preview.style.borderColor = wbColor;
      preview.style.background = wbColor + '22';
    }
  });
  wbCanvas.addEventListener('pointerleave', () => {
    preview.style.display = 'none';
  });

  // === METİN KUTUSU (tıkla ekle) ===
  document.getElementById('wb-canvas-area').addEventListener('click', (e) => {
    if (wbTool !== 'text') return;
    if (!canUseWhiteboard()) return;
    if (e.target.classList.contains('wb-textbox')) return;
    const rect = document.getElementById('wb-canvas-area').getBoundingClientRect();
    addTextBox(e.clientX - rect.left, e.clientY - rect.top, '');
  });

  // === KAPAT (öğretmen) ===
  document.getElementById('wb-close').onclick = () => {
    if (state.role !== 'teacher') return;
    toggleWhiteboard(false);
  };
}

function resizeWhiteboardCanvas() {
  const area = document.getElementById('wb-canvas-area');
  if (!area || !wbCanvas) return;
  // Mevcut çizimi koru
  const saved = wbCanvas.toDataURL();
  wbCanvas.width = area.clientWidth;
  wbCanvas.height = area.clientHeight;
  // Geri yükle
  const img = new Image();
  img.onload = () => wbCtx.drawImage(img, 0, 0);
  img.src = saved;
}

// Bu kullanıcı tahtayı kullanabilir mi? (öğretmen VEYA aktif öğrenci VEYA kilit kapalı)
function canUseWhiteboard() {
  if (state.role === 'teacher') return true;
  if (!activityLocked) return true; // kilit kapalıysa herkes
  // kilit açıksa sadece aktif öğrenci
  return currentActiveStudent && currentActiveStudent.name === state.name;
}

// Çizim — pointer down
function wbPointerDown(e) {
  if (wbTool === 'text') return;
  if (!canUseWhiteboard()) return;
  wbDrawing = true;
  const rect = wbCanvas.getBoundingClientRect();
  wbLastX = e.clientX - rect.left;
  wbLastY = e.clientY - rect.top;

  // TEK TIK = NOKTA çiz (hareket etmeden de iz bıraksın)
  const drawColor = wbTool === 'eraser' ? '#fdfdfd' : wbColor;
  const drawSize = wbTool === 'eraser' ? wbSize * 5 : wbSize;
  wbCtx.beginPath();
  wbCtx.arc(wbLastX, wbLastY, drawSize / 2, 0, Math.PI * 2);
  wbCtx.fillStyle = drawColor;
  wbCtx.fill();
  // Karşı tarafa da nokta gönder
  broadcastWhiteboard({ type: 'dot', x: wbLastX, y: wbLastY, color: drawColor, size: drawSize, w: wbCanvas.width, h: wbCanvas.height });
}

function wbPointerMove(e) {
  if (!wbDrawing) return;
  if (!canUseWhiteboard()) return;
  const rect = wbCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const drawColor = wbTool === 'eraser' ? '#fdfdfd' : wbColor;
  const drawSize = wbTool === 'eraser' ? wbSize * 5 : wbSize;

  drawLine(wbLastX, wbLastY, x, y, drawColor, drawSize);
  // Firebase'e gönder (karşı taraf görsün)
  broadcastWhiteboard({ type: 'line', x1: wbLastX, y1: wbLastY, x2: x, y2: y, color: drawColor, size: drawSize, w: wbCanvas.width, h: wbCanvas.height });

  wbLastX = x;
  wbLastY = y;
}

function wbPointerUp() {
  if (wbDrawing) {
    wbDrawing = false;
    // Çizim bitti, geçmişe kaydet
    pushWbHistory();
  }
}

function drawLine(x1, y1, x2, y2, color, size) {
  wbCtx.beginPath();
  wbCtx.moveTo(x1, y1);
  wbCtx.lineTo(x2, y2);
  wbCtx.strokeStyle = color;
  wbCtx.lineWidth = size;
  wbCtx.lineCap = 'round';
  wbCtx.lineJoin = 'round';
  wbCtx.stroke();
}

function clearWhiteboard() {
  wbCtx.clearRect(0, 0, wbCanvas.width, wbCanvas.height);
  // Metin kutularını ve sarmalayıcıları temizle
  document.querySelectorAll('.wb-textbox-wrapper').forEach(t => t.remove());
  document.querySelectorAll('.wb-textbox').forEach(t => t.remove());
}

function addTextBox(x, y, initialText) {
  if (!canUseWhiteboard()) return; // yetkisi yoksa hiç ekleme

  const area = document.getElementById('wb-canvas-area');
  const id = 'tb-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);

  // Sarmalayıcı (kutu + OK butonu)
  const wrapper = document.createElement('div');
  wrapper.className = 'wb-textbox-wrapper';
  wrapper.style.left = x + 'px';
  wrapper.style.top = y + 'px';
  wrapper.dataset.id = id;

  const box = document.createElement('div');
  box.className = 'wb-textbox';
  box.contentEditable = 'true';
  box.style.color = wbColor;
  box.style.position = 'relative';
  box.style.left = '0';
  box.style.top = '0';
  box.textContent = initialText;
  box.dataset.id = id;

  // OK butonu (yeşil, kutuyu kapatır → sadece taşınabilir olur)
  const okBtn = document.createElement('button');
  okBtn.className = 'wb-textbox-ok';
  okBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
  okBtn.title = 'Tamam (yazıyı kilitle)';
  okBtn.onclick = (e) => {
    e.stopPropagation();
    lockTextBox(wrapper, box);
    broadcastWhiteboard({ type: 'text-lock', id });
  };

  wrapper.appendChild(box);
  wrapper.appendChild(okBtn);
  area.appendChild(wrapper);

  setTimeout(() => box.focus(), 50);
  box.addEventListener('input', () => {
    broadcastWhiteboard({ type: 'text-update', id, text: box.textContent });
  });

  broadcastWhiteboard({ type: 'text-new', id, x, y, color: wbColor, text: initialText });
  return box;
}

// OK'a basınca: yazma kapanır, sadece sürüklenebilir olur
function lockTextBox(wrapper, box) {
  box.contentEditable = 'false';
  box.classList.add('locked-text');
  // OK butonunu kaldır
  const okBtn = wrapper.querySelector('.wb-textbox-ok');
  if (okBtn) okBtn.remove();
  // Sürükleme ekle
  makeTextDraggable(wrapper, box);
}

// Metin kutusunu sürüklenebilir yap
function makeTextDraggable(wrapper, box) {
  let dragging = false, offX = 0, offY = 0;
  box.addEventListener('pointerdown', (e) => {
    if (box.contentEditable === 'true') return; // yazma modundaysa sürükleme yok
    if (!canUseWhiteboard()) return;
    dragging = true;
    const wrect = wrapper.getBoundingClientRect();
    offX = e.clientX - wrect.left;
    offY = e.clientY - wrect.top;
    box.setPointerCapture(e.pointerId);
  });
  box.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const area = document.getElementById('wb-canvas-area');
    const arect = area.getBoundingClientRect();
    const nx = e.clientX - arect.left - offX;
    const ny = e.clientY - arect.top - offY;
    wrapper.style.left = nx + 'px';
    wrapper.style.top = ny + 'px';
    broadcastWhiteboard({ type: 'text-move', id: wrapper.dataset.id, x: nx, y: ny });
  });
  box.addEventListener('pointerup', (e) => {
    dragging = false;
  });
}

// Tahtayı aç/kapat — öğretmen tetikler, Firebase ile herkese yayılır
async function toggleWhiteboard(open) {
  if (!dbRoomRef) return;
  const { update } = window.fb;
  await update(dbRoomRef, { whiteboardOpen: open });
}

// Çizim verisini Firebase'e gönder
async function broadcastWhiteboard(data) {
  if (!dbRoomRef) return;
  const { update } = window.fb;
  // Her çizim olayına benzersiz zaman damgası
  await update(dbRoomRef, { whiteboardEvent: { ...data, at: Date.now(), by: state.name } });
}

// Firebase'den tahta durumu (açık/kapalı)
function applyWhiteboardState(isOpen) {
  const overlay = document.getElementById('whiteboard-overlay');
  const btn = document.getElementById('whiteboard-btn');
  if (!overlay) return;

  if (isOpen && !wbIsOpen) {
    wbIsOpen = true;
    overlay.classList.remove('closing');
    overlay.classList.add('open');
    if (btn) btn.classList.add('active');
    document.getElementById('wb-close').style.display = state.role === 'teacher' ? 'flex' : 'none';
    setTimeout(() => {
      resizeWhiteboardCanvas();
      // Başlangıç (boş) durumu geçmişe ekle
      if (wbHistory.length === 0) pushWbHistory();
    }, 50);
  } else if (!isOpen && wbIsOpen) {
    wbIsOpen = false;
    if (btn) btn.classList.remove('active');
    // Tatlıca kapanma animasyonu
    overlay.classList.remove('open');
    overlay.classList.add('closing');
    setTimeout(() => {
      overlay.classList.remove('closing');
    }, 300);
  }
}

// Firebase'den çizim olayı geldiğinde uygula
let lastWbEventTime = 0;
function applyWhiteboardEvent(ev) {
  if (!ev || !ev.at) return;
  if (ev.at <= lastWbEventTime) return;
  lastWbEventTime = ev.at;
  // Kendi gönderdiğim olayı tekrar çizme
  if (ev.by === state.name) return;
  if (!wbCtx) return;

  if (ev.type === 'line') {
    // Koordinatları kendi canvas boyutuma ölçekle
    const scaleX = wbCanvas.width / (ev.w || wbCanvas.width);
    const scaleY = wbCanvas.height / (ev.h || wbCanvas.height);
    drawLine(ev.x1 * scaleX, ev.y1 * scaleY, ev.x2 * scaleX, ev.y2 * scaleY, ev.color, ev.size);
  } else if (ev.type === 'dot') {
    // Tek tık noktası
    const scaleX = wbCanvas.width / (ev.w || wbCanvas.width);
    const scaleY = wbCanvas.height / (ev.h || wbCanvas.height);
    wbCtx.beginPath();
    wbCtx.arc(ev.x * scaleX, ev.y * scaleY, ev.size / 2, 0, Math.PI * 2);
    wbCtx.fillStyle = ev.color;
    wbCtx.fill();
  } else if (ev.type === 'clear') {
    clearWhiteboard();
  } else if (ev.type === 'snapshot') {
    // Karşı taraf undo/redo yaptı → tüm canvas'ı güncelle
    const img = new Image();
    img.onload = () => {
      wbCtx.clearRect(0, 0, wbCanvas.width, wbCanvas.height);
      wbCtx.drawImage(img, 0, 0, wbCanvas.width, wbCanvas.height);
    };
    img.src = ev.data;
  } else if (ev.type === 'text-new') {
    const area = document.getElementById('wb-canvas-area');
    if (document.querySelector(`.wb-textbox-wrapper[data-id="${ev.id}"]`)) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'wb-textbox-wrapper';
    wrapper.style.left = ev.x + 'px';
    wrapper.style.top = ev.y + 'px';
    wrapper.dataset.id = ev.id;
    const box = document.createElement('div');
    box.className = 'wb-textbox';
    box.contentEditable = 'false';
    box.dataset.id = ev.id;
    box.style.color = ev.color;
    box.style.position = 'relative';
    box.textContent = ev.text || '';
    wrapper.appendChild(box);
    area.appendChild(wrapper);
    // Karşı taraftaki kutu da taşınabilir olmalı (yetkisi olan herkes)
    makeTextDraggable(wrapper, box);
  } else if (ev.type === 'text-update') {
    const box = document.querySelector(`.wb-textbox[data-id="${ev.id}"]`);
    if (box) box.textContent = ev.text;
  } else if (ev.type === 'text-lock') {
    const wrapper = document.querySelector(`.wb-textbox-wrapper[data-id="${ev.id}"]`);
    if (wrapper) {
      const box = wrapper.querySelector('.wb-textbox');
      const okBtn = wrapper.querySelector('.wb-textbox-ok');
      if (okBtn) okBtn.remove();
      if (box) box.classList.add('locked-text');
    }
  } else if (ev.type === 'text-move') {
    const wrapper = document.querySelector(`.wb-textbox-wrapper[data-id="${ev.id}"]`);
    if (wrapper) {
      wrapper.style.left = ev.x + 'px';
      wrapper.style.top = ev.y + 'px';
    }
  }
}


// ====================================================================
// ÖVGÜ SİSTEMİ - Konfeti + büyük yazı (pedagojik reinforcement)
// ====================================================================
function showPraise(text, emoji) {
  // Eski overlay varsa kaldır
  const old = document.querySelector('.praise-overlay');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.className = 'praise-overlay';

  // === RASTGELE RENK SEÇİMİ (4 havuz) ===
  const colorPools = ['color-gold', 'color-brand', 'color-emerald', 'color-blue', 'color-coral'];
  const randomColor = colorPools[Math.floor(Math.random() * colorPools.length)];

  // Efekt renkleri — yazının rengine BAĞLI DEĞİL, hep canlı ve çok renkli
  // Bu sayede konfeti/havai fişek/parıltı kendi has orijinal renklerinde kalır
  const palette = [
    '#fbbf24', // altın sarı
    '#f59e0b', // turuncu
    '#ef4444', // kırmızı
    '#ec4899', // pembe
    '#eb0bc4', // marka pembe
    '#a855f7', // mor
    '#8b5cf6', // koyu mor
    '#0075e5', // marka mavi
    '#0ea5e9', // gök mavi
    '#06b6d4', // turkuaz
    '#10b981', // yeşil
    '#34d399', // açık yeşil
    '#fde047'  // sarı
  ];

  // Büyük yazı — emoji ayrı span'da olsun ki gradient onu da silmesin
  const textEl = document.createElement('div');
  textEl.className = `praise-text ${randomColor}`;
  const emojiSpan = document.createElement('span');
  emojiSpan.className = 'praise-emoji';
  emojiSpan.textContent = emoji;
  const wordSpan = document.createElement('span');
  wordSpan.className = 'praise-word';
  wordSpan.textContent = text;
  textEl.appendChild(emojiSpan);
  textEl.appendChild(document.createTextNode(' '));
  textEl.appendChild(wordSpan);
  overlay.appendChild(textEl);

  // === RASTGELE EFEKT SEÇİMİ (3 efekt) ===
  const effects = ['confetti', 'firework', 'sparkle'];
  const randomEffect = effects[Math.floor(Math.random() * effects.length)];
  console.log('🎨 Övgü:', randomColor, '+', randomEffect);

  if (randomEffect === 'confetti') {
    // EFEKT 1: KONFETİ
    const shapes = ['50%', '0%'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = palette[Math.floor(Math.random() * palette.length)];
      piece.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
      piece.style.width = (8 + Math.random() * 10) + 'px';
      piece.style.height = (8 + Math.random() * 10) + 'px';
      piece.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
      piece.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
      piece.style.animationDelay = (Math.random() * 0.3) + 's';
      overlay.appendChild(piece);
    }
  } else if (randomEffect === 'firework') {
    // EFEKT 2: HAVAI FİŞEK (yazının arkasından zincirleme patlama)
    const burstCount = 5; // 5 ayrı patlama
    for (let b = 0; b < burstCount; b++) {
      const burst = document.createElement('div');
      burst.className = 'firework-burst';
      // Yazının arkası civarında rastgele konum
      burst.style.left = (35 + Math.random() * 30) + '%';
      burst.style.top = (35 + Math.random() * 30) + '%';
      burst.style.animationDelay = (b * 0.3) + 's';

      // Her patlama 24 spark üretir
      const sparkCount = 24;
      for (let s = 0; s < sparkCount; s++) {
        const spark = document.createElement('div');
        spark.className = 'firework-spark';
        const angle = (360 / sparkCount) * s + (Math.random() * 20 - 10);
        const distance = 100 + Math.random() * 150;
        spark.style.setProperty('--angle', angle + 'deg');
        spark.style.setProperty('--distance', distance + 'px');
        spark.style.background = palette[Math.floor(Math.random() * palette.length)];
        spark.style.boxShadow = `0 0 8px 2px ${palette[Math.floor(Math.random() * palette.length)]}`;
        spark.style.animationDelay = (b * 0.3) + 's';
        burst.appendChild(spark);
      }
      overlay.appendChild(burst);
    }
  } else if (randomEffect === 'sparkle') {
    // EFEKT 3: PIRILTI (ekrana yayılmış parıltılar)
    for (let i = 0; i < 50; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.color = palette[Math.floor(Math.random() * palette.length)];
      sparkle.style.width = (15 + Math.random() * 25) + 'px';
      sparkle.style.height = sparkle.style.width;
      sparkle.style.animationDelay = (Math.random() * 1.5) + 's';
      sparkle.style.animationDuration = (1 + Math.random() * 1) + 's';
      overlay.appendChild(sparkle);
    }
  }

  document.body.appendChild(overlay);

  // 4 saniye sonra otomatik kaldır
  setTimeout(() => overlay.remove(), 4000);
}

// Firebase'den övgü mesajı geldiğinde herkese göster
let lastPraiseTime = 0;
function applyPraise(praise) {
  if (!praise || !praise.at) return;
  // Sadece YENİ övgüleri göster (aynı süslemeyi sayfa açılışında tekrar tetikleme)
  if (praise.at <= lastPraiseTime) return;
  // İlk kez geliyorsa ama eski bir kayıtsa atla (5 saniyeden eski)
  if (Date.now() - praise.at > 5000) {
    lastPraiseTime = praise.at;
    return;
  }
  lastPraiseTime = praise.at;
  showPraise(praise.text, praise.emoji);
}



// ====================================================================
// ÖĞRETMEN SAĞ TIK MENÜSÜ - öğrencinin kamera/mic'ini zorla kapat/aç
// ====================================================================
let ctxMenuStudentName = null;

function openTeacherContextMenu(x, y, studentName) {
  ctxMenuStudentName = studentName;
  const menu = document.getElementById('teacher-context-menu');
  document.getElementById('ctx-student-name').textContent = studentName;

  // Firebase'den bu öğrencinin force durumunu oku
  const forceState = (firebaseForceStates && firebaseForceStates[studentName]) || {};
  const micForceMuted = forceState.micMuted === true;
  const camForceDisabled = forceState.camDisabled === true;

  // Etiketleri güncelle (toggle mantığı)
  document.getElementById('ctx-mic-label').textContent =
    micForceMuted ? 'Mikrofonunu AÇ (şu an zorla kapalı)' : 'Mikrofonunu KAPAT';
  document.getElementById('ctx-cam-label').textContent =
    camForceDisabled ? 'Kamerasını AÇ (şu an zorla kapalı)' : 'Kamerasını KAPAT';

  const micItem = document.getElementById('ctx-toggle-mic');
  const camItem = document.getElementById('ctx-toggle-cam');
  micItem.classList.toggle('disabled-state', micForceMuted);
  camItem.classList.toggle('disabled-state', camForceDisabled);

  // Menüyü göster
  menu.style.left = Math.min(x, window.innerWidth - 240) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
  menu.style.display = 'block';
}

function closeTeacherContextMenu() {
  document.getElementById('teacher-context-menu').style.display = 'none';
  ctxMenuStudentName = null;
}

// Tıklama dışarıdaysa menüyü kapat
document.addEventListener('click', (e) => {
  const menu = document.getElementById('teacher-context-menu');
  if (menu && !menu.contains(e.target)) closeTeacherContextMenu();
});

// Mic toggle
document.getElementById('ctx-toggle-mic').onclick = async () => {
  if (!ctxMenuStudentName || !dbRoomRef) return;
  const { update } = window.fb;
  const cur = (firebaseForceStates && firebaseForceStates[ctxMenuStudentName]) || {};
  await update(dbRoomRef, {
    [`forceStates/${ctxMenuStudentName}/micMuted`]: !cur.micMuted
  });
  closeTeacherContextMenu();
};

// Cam toggle
document.getElementById('ctx-toggle-cam').onclick = async () => {
  if (!ctxMenuStudentName || !dbRoomRef) return;
  const { update } = window.fb;
  const cur = (firebaseForceStates && firebaseForceStates[ctxMenuStudentName]) || {};
  await update(dbRoomRef, {
    [`forceStates/${ctxMenuStudentName}/camDisabled`]: !cur.camDisabled
  });
  closeTeacherContextMenu();
};

// Firebase'den force state takibi (herkes dinler)
let firebaseForceStates = {};
function applyForceStates(forceStates) {
  firebaseForceStates = forceStates || {};

  // Tüm öğrenci kutularına force göstergesini uygula
  participantBoxes.forEach((entry) => {
    if (entry.role !== 'student') return;
    const fs = firebaseForceStates[entry.name] || {};
    entry.box.classList.toggle('force-muted', fs.micMuted === true);
    entry.box.classList.toggle('force-disabled', fs.camDisabled === true);
  });

  // Eğer ben öğrenciysem ve bana force uygulanmışsa, mic/cam'imi kapatmaya çalış
  if (state.role === 'student' && lkRoom) {
    const myForce = firebaseForceStates[state.name] || {};
    if (myForce.micMuted === true && micEnabled) {
      // Öğretmen mic'imi kapatmış
      lkRoom.localParticipant.setMicrophoneEnabled(false).catch(() => {});
      micEnabled = false;
      const btn = document.getElementById('toggle-mic');
      if (btn) {
        btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
        btn.classList.add('bg-red-50', 'text-red-600');
        btn.classList.remove('bg-indigo-50', 'text-indigo-600');
        btn.disabled = true; // Açamasın
        btn.style.opacity = '0.6';
        btn.title = 'Öğretmen mikrofonunuzu kapattı';
      }
    } else if (myForce.micMuted !== true) {
      const btn = document.getElementById('toggle-mic');
      if (btn) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.title = 'Mikrofon';
      }
    }
    if (myForce.camDisabled === true && camEnabled) {
      lkRoom.localParticipant.setCameraEnabled(false).catch(() => {});
      camEnabled = false;
      const btn = document.getElementById('toggle-cam');
      if (btn) {
        btn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
        btn.classList.add('bg-red-50', 'text-red-600');
        btn.classList.remove('bg-indigo-50', 'text-indigo-600');
        btn.disabled = true;
        btn.style.opacity = '0.6';
        btn.title = 'Öğretmen kameranızı kapattı';
      }
      const entry = participantBoxes.get(myPresenceId);
      if (entry) {
        entry.box.querySelectorAll('video').forEach(v => v.remove());
        entry.box.classList.add('no-video');
      }
    } else if (myForce.camDisabled !== true) {
      const btn = document.getElementById('toggle-cam');
      if (btn) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.title = 'Kamera';
      }
    }
  }
}
