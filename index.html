<style>
  /* ============ STYLE GUIDE: TACEV Super English ============ */

  /* Custom scrollbar (style guide standard) */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Hero gradient (premium — login, header) */
  .hero-gradient {
    background: linear-gradient(45deg, #0075e5 0%, #eb0bc4 75%, #eb0bc4 100%);
  }

  /* Body background — marka renkleriyle dokulu, premium */
  body {
    min-height: 100vh;
    background-color: #f8fafc;
    background-image:
      /* Yumuşak renkli ışıklar — marka renklerinden esinli */
      radial-gradient(at 15% 20%, rgba(0, 117, 229, 0.12) 0px, transparent 50%),
      radial-gradient(at 85% 10%, rgba(235, 11, 196, 0.10) 0px, transparent 50%),
      radial-gradient(at 75% 85%, rgba(99, 102, 241, 0.10) 0px, transparent 50%),
      radial-gradient(at 20% 90%, rgba(168, 85, 247, 0.08) 0px, transparent 50%),
      /* İnce ızgara doku */
      linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    background-attachment: fixed;
  }

  /* Role tag'leri (RBAC) */
  .tag-yonetici { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
  .tag-asistan  { background-color: #e0f2fe; color: #075985; border: 1px solid #38bdf8; }
  .tag-veli     { background-color: #dcfce7; color: #166534; border: 1px solid #4ade80; }

  /* Loader (style guide standard) */
  .loader {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #4f46e5;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== LAYOUT VARYASYONLARI =====
     A = dikey sağ kolon (varsayılan)
     B = sağ kolonda 2x2 grid
     C = üstte yatay şerit
     D = dikey + konuşan büyür (akıllı)
  ============================== */

  /* Layout A — sağ kolon, dikey (varsayılan) */
  .layout-a .app-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header header"
      "main cameras"
      "footer cameras";
    height: 100vh;
    gap: 16px;
    padding: 16px;
  }
  .layout-a .cameras {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }
  .layout-a .cam-wrap {
    flex: 1 1 0;
    min-height: 180px;
  }

  /* Layout B — sağ kolonda 2x2 grid */
  .layout-b .app-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header header"
      "main cameras"
      "footer cameras";
    height: 100vh;
    gap: 16px;
    padding: 16px;
  }
  .layout-b .cameras {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 1fr;
    gap: 10px;
    align-content: start;
  }
  .layout-b .cam-wrap { min-height: 130px !important; }

  /* Layout C — üstte yatay şerit (önerilen) */
  .layout-c .app-grid {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 160px 1fr auto;
    grid-template-areas:
      "header"
      "cameras"
      "main"
      "footer";
    height: 100vh;
    gap: 16px;
    padding: 16px;
  }
  .layout-c .cameras {
    display: grid;
    grid-template-columns: repeat(var(--cam-count, 4), 1fr);
    gap: 12px;
  }
  .layout-c .cam-wrap { min-height: 0 !important; height: 100%; }

  /* Layout D — dikey + konuşan büyür */
  .layout-d .app-grid {
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header header"
      "main cameras"
      "footer cameras";
    height: 100vh;
    gap: 16px;
    padding: 16px;
  }
  .layout-d .cameras { display: flex; flex-direction: column; gap: 10px; }
  .layout-d .cam-wrap { flex: 1; transition: flex 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .layout-d .cam-wrap.speaking { flex: 2.5; }

  /* Mobil — tüm layoutlar tek kolona düşer */
  @media (max-width: 768px) {
    .layout-a .app-grid, .layout-b .app-grid, .layout-d .app-grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr auto;
      grid-template-areas:
        "header"
        "cameras"
        "main"
        "footer";
    }
    .layout-a .cameras, .layout-d .cameras {
      flex-direction: row;
      height: 140px;
    }
    .layout-b .cameras {
      grid-template-columns: repeat(4, 1fr);
      height: 110px;
    }
    .cam-wrap { min-height: 0 !important; height: 100%; }
  }

  /* ===== KONUŞAN PARILTISI ===== */
  @keyframes speakingGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217, 70, 239, 0.7), 0 8px 24px rgba(67, 56, 202, 0.15); }
    50%      { box-shadow: 0 0 0 8px rgba(217, 70, 239, 0.0), 0 8px 24px rgba(67, 56, 202, 0.15); }
  }
  .cam-wrap.speaking {
    border-color: #d946ef !important;
    animation: speakingGlow 1.5s ease-in-out infinite;
  }

  /* ===== SECRET CODE TOAST ===== */
  .secret-toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: linear-gradient(45deg, #0075e5, #eb0bc4);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 14px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .secret-toast.show { transform: translateX(-50%) translateY(0); }

  /* Kameralar */
  .cam-wrap {
    background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 2px solid white;
    box-shadow: 0 8px 24px rgba(67, 56, 202, 0.15), 0 2px 6px rgba(235, 11, 196, 0.08);
  }
  .cam-wrap video { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 1; }
  .cam-wrap.no-video video { display: none; }

  /* Avatar placeholder — kamera yoksa gösterilen */
  .cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 0;
    color: white;
  }
  .cam-wrap:not(.no-video) .cam-placeholder { display: none; }

  .cam-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(45deg, #0075e5, #eb0bc4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 24px;
    color: white;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    text-transform: uppercase;
  }
  /* Küçük kutular için avatar boyutu küçülsün */
  .layout-b .cam-avatar, .layout-c .cam-avatar { width: 48px; height: 48px; font-size: 18px; }

  .cam-noVideoIcon {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 24px;
    height: 24px;
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    z-index: 2;
  }
  .cam-wrap:not(.no-video) .cam-noVideoIcon { display: none; }

  .cam-label {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(30, 27, 75, 0.85);
    backdrop-filter: blur(8px);
    color: white;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    z-index: 3;
  }

  /* Etkinlik girdileri (boşluk doldurma) */
  .fill-input {
    display: inline-block;
    min-width: 120px;
    padding: 4px 12px;
    margin: 0 4px;
    background: #eef2ff;
    border: none;
    border-bottom: 2px solid #6366f1;
    border-radius: 8px 8px 0 0;
    color: #312e81;
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    transition: all 0.2s;
  }
  .fill-input:focus { outline: none; background: #e0e7ff; }
  .fill-input.correct {
    border-color: #10b981;
    background: #ecfdf5;
    color: #065f46;
  }
  .fill-input.wrong {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }

  /* Çoktan seçmeli */
  .choice-btn {
    transition: all 0.2s;
  }
  .choice-btn:hover {
    border-color: #6366f1;
    transform: translateX(4px);
    background: #eef2ff;
  }
  .choice-btn.selected {
    border-color: #6366f1;
    background: #eef2ff;
  }
  .choice-btn.correct {
    border-color: #10b981;
    background: #ecfdf5;
  }
  .choice-btn.wrong {
    border-color: #ef4444;
    background: #fef2f2;
  }

  /* True/False */
  .tf-btn { transition: all 0.2s; }
  .tf-btn:hover { transform: scale(1.02); }
  .tf-btn.selected-true {
    border-color: #10b981;
    background: #ecfdf5;
    color: #065f46;
  }
  .tf-btn.selected-false {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }

  /* Sürükle-bırak */
  .draggable {
    transition: all 0.15s;
    cursor: grab;
  }
  .draggable:active { cursor: grabbing; }
  .draggable.dragging { opacity: 0.4; }
  .drop-zone { transition: all 0.15s; }
  .drop-zone.over {
    border-color: #6366f1;
    background: #eef2ff;
  }
  .drop-zone.filled {
    border-style: solid;
    border-color: #10b981;
    background: #ecfdf5;
  }
  .drop-zone.wrong {
    border-color: #ef4444;
    background: #fef2f2;
  }

  /* Resme tıklama */
  .clickable-spot {
    position: absolute;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clickable-spot:hover {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.15);
  }
  .clickable-spot.clicked-correct {
    border-color: #10b981;
    background: rgba(16, 185, 129, 0.25);
  }
  .clickable-spot.clicked-wrong {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.25);
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.3s; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.4s ease-out; }
</style>
</head>

<script>
// ====================================================================
// DERS İÇERİĞİ
// ====================================================================
const LESSON = [
  {
    type: 'fill',
    title: 'Boşlukları Doldur',
    instruction: 'Doğru fiil çekimini yazın',
    template: 'She ___ to school every day. He ___ coffee in the morning.',
    answers: ['goes', 'drinks']
  },
  {
    type: 'multiple',
    title: 'Doğru Cevabı Seç',
    instruction: 'Aşağıdakilerden hangisi doğrudur?',
    question: 'What ___ you do yesterday?',
    choices: ['do', 'did', 'does', 'doing'],
    correct: 1
  },
  {
    type: 'truefalse',
    title: 'Doğru mu Yanlış mı?',
    instruction: 'Cümleyi okuyun ve karar verin',

// ====================================================================
// FIREBASE SENKRON
// ====================================================================
async function setupFirebase() {
  const { ref, onValue, set, get, update } = window.fb;
  dbRoomRef = ref(window.fb.db, `rooms/${state.room}`);

  if (state.role === 'teacher') {
    const snap = await get(dbRoomRef);
    if (!snap.exists()) {
      await set(dbRoomRef, { currentPage: 0, answers: {}, createdAt: Date.now() });
    }
  }

  // === PRESENCE: Ben odaya girdiğimi Firebase'e bildir ===
  myPresenceId = `${state.role}_${state.name}_${Date.now()}`;
  const presenceRef = ref(window.fb.db, `rooms/${state.room}/presence/${myPresenceId}`);
  await set(presenceRef, {
    name: state.name,
    role: state.role,
    joinedAt: Date.now()
  });

  // Sayfayı kapatınca Firebase'den sil
  window.addEventListener('beforeunload', () => {
    try { set(presenceRef, null); } catch(e) {}
  });

  // Periyodik "ben hala buradayım" sinyali (heartbeat)
  setInterval(() => {
    update(presenceRef, { lastSeen: Date.now() });
  }, 5000);

  // === PRESENCE DİNLE: Odadaki herkesin kutusunu oluştur ===
  const presenceListRef = ref(window.fb.db, `rooms/${state.room}/presence`);
  onValue(presenceListRef, (snap) => {
    const presence = snap.val() || {};
    const activeIds = new Set();

    // Aktif olanları kontrol et (son 15 saniyede görülmüş)
    const now = Date.now();
    Object.entries(presence).forEach(([id, info]) => {
      const lastSeen = info.lastSeen || info.joinedAt;
      if (now - lastSeen < 15000) {
        activeIds.add(id);
        // Bu kişinin kutusu yoksa oluştur
        if (!participantBoxes.has(id)) {
          console.log('👤 Yeni katılımcı (Firebase):', id, info);
          createCameraBox(id, info.role, info.name);
        }
      }
    });

    // Artık aktif olmayanları kaldır
    participantBoxes.forEach((entry, id) => {
      if (!activeIds.has(id)) {
        console.log('👋 Ayrılan katılımcı:', id);
        removeCameraBox(id);
      }
    });
  });

  // === ANA OYUN STATE DİNLE (sayfa, cevaplar, layout) ===
  onValue(dbRoomRef, (snap) => {
    const data = snap.val();
    if (!data) return;
    if (data.currentPage !== undefined && data.currentPage !== state.currentPage) {
      state.currentPage = data.currentPage;
      renderActivity();
    }
    if (data.answers && data.answers[state.currentPage]) {
      state.answers[state.currentPage] = data.answers[state.currentPage];
      applyAnswerToUI(state.currentPage, data.answers[state.currentPage]);
    }
    if (data.layout && LAYOUT_INFO[data.layout]) {
      applyLayout(data.layout, state.role !== 'teacher');
    }
  });
}

// ====================================================================
// LIVEKIT VIDEO
// ====================================================================
let lkRoom = null;
let micEnabled = true;
let camEnabled = true;

async function setupVideo() {
  // ===== ADIM 0: Kendi kutum Firebase presence sistemi ile otomatik oluşturulacak =====
  console.log('✓ Setup başladı, Firebase presence aktif');

  // ===== ADIM 1: Token al =====
  let data;
  try {
    const tokenRes = await fetch('/api/livekit-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        room: `super-english-${state.room}`,
        identity: `${state.role}-${state.name}-${Date.now()}`,
        name: state.name
      })
    });
    data = await tokenRes.json();
    if (!data.token) throw new Error(data.error || 'Token alınamadı');
  } catch (e) {
    console.error('Token hatası:', e);
    showError('Derse bağlanılamadı (token): ' + e.message);
    return;
  }

  // ===== ADIM 2: Room oluştur ve event handler'ları bağla =====
  lkRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

  lkRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
    if (track.kind === 'video') attachRemoteVideo(track, participant);
    else if (track.kind === 'audio') {
      const audioEl = track.attach();
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
    }
  });

  lkRoom.on(LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
    console.log('🆕 YENİ KATILIMCI:', participant.identity, participant.name);
    const isTeacher = participant.identity.startsWith('teacher-');
    const role = isTeacher ? 'teacher' : 'student';
    const name = participant.name || extractNameFromIdentity(participant.identity);
    createCameraBox(participant.identity, role, name);
  });
  
  // Data mesajı gelirse — özellikle 'hello' sinyali — kutuyu garantile
  lkRoom.on(LivekitClient.RoomEvent.DataReceived, (payload, participant) => {
    if (!participant) return;
    try {
      const msg = JSON.parse(new TextDecoder().decode(payload));
      if (msg.type === 'hello') {
        console.log('👋 Hello aldım:', participant.identity, msg);
        // Kutu yoksa oluştur
        if (!participantBoxes.has(participant.identity)) {
          const isTeacher = participant.identity.startsWith('teacher-');
          createCameraBox(participant.identity, msg.role || (isTeacher ? 'teacher' : 'student'), msg.name);
        }
      }
    } catch(e) { console.warn('Data parse hatası:', e); }
  });

  lkRoom.on(LivekitClient.RoomEvent.ParticipantDisconnected, (participant) => {
    removeCameraBox(participant.identity);
  });

  lkRoom.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
    if (track.kind === 'video') {
      const entry = participantBoxes.get(participant.identity);
      if (entry) {
        entry.box.querySelectorAll('video').forEach(v => v.remove());
        entry.box.classList.add('no-video');
      }
    }
  });

  lkRoom.on(LivekitClient.RoomEvent.TrackMuted, (publication, participant) => {
    if (publication.kind === 'video') {
      const entry = participantBoxes.get(participant.identity);
      if (entry) entry.box.classList.add('no-video');
    }
  });
  lkRoom.on(LivekitClient.RoomEvent.TrackUnmuted, (publication, participant) => {
    if (publication.kind === 'video') {
      const entry = participantBoxes.get(participant.identity);
      if (entry) entry.box.classList.remove('no-video');
    }
  });

  lkRoom.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
    document.querySelectorAll('.cam-wrap').forEach(b => b.classList.remove('speaking'));
    speakers.forEach(sp => {
      const entry = participantBoxes.get(sp.identity);
      if (entry) entry.box.classList.add('speaking');
    });
  });

  // ===== ADIM 3: Odaya bağlan =====
  try {
    await lkRoom.connect(data.wsUrl, data.token, { autoSubscribe: true });
    console.log('✓ LiveKit odasına bağlandı');
    console.log('Şu an odada olan diğer katılımcılar:', lkRoom.remoteParticipants.size);
    
    // KRİTİK: Bağlandığım anda diğerlerine "ben buradayım" sinyali yolla
    // Bu, kamera/mic izni olmasa bile çalışır
    try {
      const helloPayload = new TextEncoder().encode(JSON.stringify({ type: 'hello', name: state.name, role: state.role }));
      await lkRoom.localParticipant.publishData(helloPayload, { reliable: true });
      console.log('✓ Hello sinyali gönderildi');
    } catch (dataErr) {
      console.warn('Data publish hatası:', dataErr);
    }
  } catch (e) {
    console.error('Bağlantı hatası:', e);
    showError('Odaya bağlanılamadı: ' + e.message);
    return;
  }

  // ===== ADIM 4: Odadaki mevcut katılımcıları göster =====
  lkRoom.remoteParticipants.forEach((participant) => {
    const isTeacher = participant.identity.startsWith('teacher-');
    const role = isTeacher ? 'teacher' : 'student';
    const name = participant.name || extractNameFromIdentity(participant.identity);
    createCameraBox(participant.identity, role, name);
  });

  // ===== ADIM 5: Mikrofon dene (BAĞIMSIZ try/catch) =====
  try {
    await lkRoom.localParticipant.setMicrophoneEnabled(true);
    console.log('✓ Mikrofon açıldı');
  } catch (micErr) {
    console.warn('⚠ Mikrofon izni yok:', micErr.message);
    micEnabled = false;
    const micBtn = document.getElementById('toggle-mic');
    if (micBtn) {
      micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
      micBtn.classList.add('bg-red-50', 'text-red-600');
      micBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
    }
  }

  // ===== ADIM 6: Kamera dene (BAĞIMSIZ try/catch) =====
  try {
    await lkRoom.localParticipant.setCameraEnabled(true);
    const pubs = Array.from(lkRoom.localParticipant.videoTrackPublications.values());
    if (pubs.length > 0 && pubs[0].track) attachLocalVideo(pubs[0].track);
    console.log('✓ Kamera açıldı');
  } catch (camErr) {
    console.warn('⚠ Kamera izni yok:', camErr.message);
    camEnabled = false;
    const camBtn = document.getElementById('toggle-cam');
    if (camBtn) {
      camBtn.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
      camBtn.classList.add('bg-red-50', 'text-red-600');
      camBtn.classList.remove('bg-indigo-50', 'text-indigo-600');
    }
    // Kutu zaten 'no-video' ile başladı, placeholder görünmeye devam edecek
  }

  console.log('🎉 Setup tamamlandı, derse hazır');
}

// ====================================================================
// DİNAMİK KAMERA SİSTEMİ
// ====================================================================
// participantBoxes: identity → { box, role, name } eşlemesi
const participantBoxes = new Map();

// Identity'den isim çıkar: "teacher-Ahmet-12345" → "Ahmet"
function extractNameFromIdentity(identity) {
  const parts = identity.split('-');
  if (parts.length >= 3) {
    return parts.slice(1, -1).join('-');
  }
  return identity;
}

// İsimden iki harf üret: "Ahmet Yılmaz" → "AY", "Ali" → "A"
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0][0].toUpperCase();
}

// Kutu oluştur — her zaman placeholder ile (kamera açılınca video üstüne gelir)
function createCameraBox(identity, role, name) {
  if (participantBoxes.has(identity)) return participantBoxes.get(identity).box;

  const box = document.createElement('div');
  box.className = 'cam-wrap no-video'; // varsayılan: kamera yok
  box.dataset.identity = identity;
  box.dataset.role = role;

  // Placeholder (avatar + isim)
  const placeholder = document.createElement('div');
  placeholder.className = 'cam-placeholder';
  placeholder.innerHTML = `
    <div class="cam-avatar">${getInitials(name)}</div>
    <div class="text-xs font-bold opacity-90">${role === 'teacher' ? 'Teacher ' + name : name}</div>
  `;
  box.appendChild(placeholder);

  // "Kamera kapalı" ikonu
  const noVideoIcon = document.createElement('div');
  noVideoIcon.className = 'cam-noVideoIcon';
  noVideoIcon.innerHTML = '<i class="fa-solid fa-video-slash"></i>';
  box.appendChild(noVideoIcon);

  // Alt isim etiketi
  const label = document.createElement('span');
  label.className = 'cam-label';
  const icon = role === 'teacher' ? 'fa-chalkboard-user' : 'fa-user-graduate';
  const displayName = role === 'teacher' ? `Teacher ${name}` : name;
  label.innerHTML = `<i class="fa-solid ${icon} mr-1"></i> ${displayName}`;
  box.appendChild(label);

  document.getElementById('cameras-container').appendChild(box);
  participantBoxes.set(identity, { box, role, name });
  updateCameraLayout();
  return box;
}

// Kutuyu sil (kişi ayrıldı)
function removeCameraBox(identity) {
  const entry = participantBoxes.get(identity);
  if (!entry) return;
  entry.box.remove();
  participantBoxes.delete(identity);
  updateCameraLayout();
}

// Layout C için: kamera sayısına göre CSS değişkenini güncelle
function updateCameraLayout() {
  const count = participantBoxes.size;
  document.getElementById('cameras-container').style.setProperty('--cam-count', count);
}

// Karşı tarafın videosunu doğru kutuya tak — isim eşleştirmesi ile
function attachRemoteVideo(track, participant) {
  const isTeacher = participant.identity.startsWith('teacher-');
  const role = isTeacher ? 'teacher' : 'student';
  const name = participant.name || extractNameFromIdentity(participant.identity);

  // Bu isme ait Firebase kutusunu bul (öncelikli)
  let targetBox = null;
  participantBoxes.forEach((entry, id) => {
    if (entry.name === name && entry.role === role) targetBox = entry.box;
  });

  // Bulamazsan oluştur
  if (!targetBox) {
    targetBox = createCameraBox(participant.identity, role, name);
  }

  targetBox.querySelectorAll('video').forEach(v => v.remove());
  const videoEl = track.attach();
  targetBox.appendChild(videoEl);
  targetBox.classList.remove('no-video');
}

// Kendi video'nu kendi Firebase kutuna koy
function attachLocalVideo(track) {
  // Firebase kutuyu zaten oluşturmuş olmalı (myPresenceId ile)
  let targetBox = null;
  if (myPresenceId && participantBoxes.has(myPresenceId)) {
    targetBox = participantBoxes.get(myPresenceId).box;
  } else {
    // Yedek olarak oluştur
    targetBox = createCameraBox(myPresenceId || 'LOCAL', state.role, state.name);
  }
  targetBox.querySelectorAll('video').forEach(v => v.remove());
  const videoEl = track.attach();
  videoEl.muted = true;
  targetBox.appendChild(videoEl);
  targetBox.classList.remove('no-video');
}

  btn.classList.toggle('text-indigo-600', micEnabled);
};
document.getElementById('toggle-cam').onclick = async () => {
  if (!lkRoom) return;
  camEnabled = !camEnabled;
  await lkRoom.localParticipant.setCameraEnabled(camEnabled);

  // Kendi Firebase kutuna placeholder uygula/kaldır
  const entry = participantBoxes.get(myPresenceId);
  if (entry) {
    if (camEnabled) {
      entry.box.classList.remove('no-video');
    } else {
      entry.box.querySelectorAll('video').forEach(v => v.remove());
      entry.box.classList.add('no-video');
    }
  }

  const btn = document.getElementById('toggle-cam');
  btn.innerHTML = camEnabled ? '<i class="fa-solid fa-video"></i>' : '<i class="fa-solid fa-video-slash"></i>';
  btn.classList.toggle('bg-red-50', !camEnabled);
  btn.classList.toggle('text-red-600', !camEnabled);
  btn.classList.toggle('bg-indigo-50', camEnabled);
  btn.classList.toggle('text-indigo-600', camEnabled);
};

function renderActivity() {

  const area = document.getElementById('activity-area');

  document.getElementById('page-count').textContent = `${state.currentPage + 1} / ${LESSON.length}`;
  document.getElementById('progress-fill').style.width = `${((state.currentPage + 1) / LESSON.length) * 100}%`;
  document.getElementById('prev-btn').disabled = state.currentPage === 0;
  document.getElementById('next-btn').disabled = state.currentPage === LESSON.length - 1;

  // Etkinlik tip ikonları
  const typeIcons = {
    fill: 'fa-pen-to-square',
    multiple: 'fa-list-check',
    truefalse: 'fa-circle-question',
    match: 'fa-arrows-left-right',
    image: 'fa-image',
    writing: 'fa-pen'
  };
  const typeLabels = {
    fill: 'Boşluk Doldurma',
    multiple: 'Çoktan Seçmeli',
    truefalse: 'Doğru / Yanlış',
    match: 'Eşleştirme',
    image: 'Resme Tıkla',
    writing: 'Kompozisyon'
  };

  let html = `
    <div class="fade-in-up">
      <div class="flex items-center gap-2 mb-3">
        <span class="bg-indigo-100 text-indigo-700 text-[10px] font-black uppercase tracking-wider px-2.5 py-1 rounded-lg">
          <i class="fa-solid ${typeIcons[page.type]} mr-1"></i> ${typeLabels[page.type]}
        </span>
        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">
          Sayfa ${state.currentPage + 1}
        </span>
      </div>
      <h2 class="text-3xl md:text-4xl font-black text-indigo-900 mb-2 tracking-tight">${page.title}</h2>
      <p class="text-gray-600 mb-8 text-base">${page.instruction}</p>
  `;

  if (page.type === 'fill') html += renderFill(page);
  if (page.type === 'multiple') html += renderMultiple(page);
  if (page.type === 'truefalse') html += renderTrueFalse(page);
  if (page.type === 'match') html += renderMatch(page);
  if (page.type === 'image') html += renderImage(page);
  if (page.type === 'writing') html += renderWriting(page);

  html += '</div>';
  area.innerHTML = html;
  attachActivityListeners(page);

  if (state.answers[state.currentPage]) {
    applyAnswerToUI(state.currentPage, state.answers[state.currentPage]);
  }
}

// === BOŞLUK DOLDURMA ===
function renderFill(page) {
  const parts = page.template.split('___');
  let html = '<div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 text-xl md:text-2xl leading-loose text-indigo-900 font-medium">';
  parts.forEach((part, i) => {
    html += part;
    if (i < parts.length - 1) {
      html += `<input class="fill-input" data-blank="${i}" type="text" placeholder="...">`;
    }
  });
  html += '</div>';
  return html;
}

// === ÇOKTAN SEÇMELİ ===
function renderMultiple(page) {
  let html = `
    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 mb-6">
      <p class="text-2xl font-black text-indigo-900 text-center">${page.question}</p>
    </div>
    <div class="grid gap-3">
  `;
  page.choices.forEach((c, i) => {
    html += `
      <button class="choice-btn bg-white border-2 border-gray-200 rounded-xl p-4 flex items-center gap-4 text-left" data-idx="${i}">
        <span class="w-9 h-9 bg-indigo-100 text-indigo-700 rounded-lg flex items-center justify-center font-black flex-shrink-0">${String.fromCharCode(65 + i)}</span>
        <span class="font-bold text-gray-800 text-base">${c}</span>
      </button>
    `;
  });
  html += '</div>';
  return html;
}

// === TRUE/FALSE ===
function renderTrueFalse(page) {
  return `
    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 mb-6">
      <p class="text-xl md:text-2xl font-bold text-indigo-900 italic text-center leading-relaxed">"${page.statement}"</p>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-4">
      <button class="tf-btn bg-white border-2 border-gray-200 rounded-2xl p-8 font-black text-xl text-gray-700 hover:border-emerald-400" data-val="true">
        <i class="fa-solid fa-check text-2xl text-emerald-500 mb-2 block"></i>
        Doğru
      </button>
      <button class="tf-btn bg-white border-2 border-gray-200 rounded-2xl p-8 font-black text-xl text-gray-700 hover:border-red-400" data-val="false">
        <i class="fa-solid fa-xmark text-2xl text-red-500 mb-2 block"></i>
        Yanlış
      </button>
    </div>
    <div id="tf-feedback" class="hidden p-4 rounded-xl text-sm font-bold"></div>
  `;
}

// === EŞLEŞTİRME ===
function renderMatch(page) {
  const shuffled = [...page.pairs].sort(() => Math.random() - 0.5);
  let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">';

  // Sol — İngilizce kelimeler (sürüklenebilir)
  html += `
    <div>
      <p class="text-[10px] font-black text-gray-500 uppercase tracking-wider mb-3">
        <i class="fa-solid fa-language mr-1"></i> English
      </p>
      <div class="space-y-2">
  `;
  shuffled.forEach(p => {
    html += `
      <div class="draggable bg-white border-2 border-indigo-200 rounded-xl p-3 font-bold text-indigo-900 flex items-center gap-3" draggable="true" data-en="${p.en}">
        <i class="fa-solid fa-grip-vertical text-indigo-300"></i> ${p.en}
      </div>
    `;
  });
  html += '</div></div>';

  // Sağ — Türkçe (drop zone)
  html += `
    <div>
      <p class="text-[10px] font-black text-gray-500 uppercase tracking-wider mb-3">
        <i class="fa-solid fa-flag mr-1"></i> Türkçe
      </p>
      <div class="space-y-2">
  `;
  page.pairs.forEach(p => {
    html += `
      <div class="drop-zone bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-3 min-h-[52px] flex items-center gap-3" data-tr="${p.tr}" data-correct-en="${p.en}">
        <span class="target-word text-gray-500 italic flex-1">${p.tr}</span>
      </div>
    `;
  });
  html += '</div></div></div>';
  return html;
}

// === RESME TIKLAMA ===
function renderImage(page) {
  let html = `
    <div class="relative bg-gradient-to-br from-indigo-100 to-purple-100 rounded-2xl border border-indigo-200 overflow-hidden" style="height: 360px;">
      <div class="absolute inset-0 flex items-center justify-center text-6xl md:text-8xl tracking-widest">${page.emoji}</div>
  `;
  page.spots.forEach((s, i) => {
    html += `<div class="clickable-spot" data-idx="${i}" data-correct="${s.correct}" style="left:${s.x};top:${s.y};"></div>`;
  });
  html += '</div>';
  return html;
}

// === YAZMA ===
function renderWriting(page) {
  return `
    <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-r-lg mb-4">
      <p class="text-base font-bold text-indigo-900 italic">${page.prompt}</p>
    </div>
    <textarea id="writing-input"
              class="w-full min-h-[240px] bg-white border border-gray-300 rounded-xl p-5 text-base outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition resize-y"
              placeholder="Cevabınızı buraya yazın..."></textarea>
    <div class="flex justify-between items-center mt-2">
      <span class="text-xs text-gray-500"><i class="fa-solid fa-circle-info mr-1"></i> Karşı taraf yazdıklarınızı anlık görüyor</span>
      <span id="word-count" class="text-xs font-bold text-indigo-600">0 kelime</span>
    </div>
  `;
}

// ====================================================================
// ETKİNLİK OLAY DİNLEYİCİLERİ
// ====================================================================
function attachActivityListeners(page) {
  if (page.type === 'fill') {
    document.querySelectorAll('.fill-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const values = {};
        document.querySelectorAll('.fill-input').forEach(i => {
          values[i.dataset.blank] = i.value;
        });
        syncAnswer(state.currentPage, { type: 'fill', values });
      });
    });
  }

  if (page.type === 'multiple') {
    document.querySelectorAll('.choice-btn').forEach(c => {
      c.onclick = () => {
        const idx = parseInt(c.dataset.idx);
        syncAnswer(state.currentPage, { type: 'multiple', selected: idx, correct: page.correct });
      };
    });
  }

  if (page.type === 'truefalse') {
    document.querySelectorAll('.tf-btn').forEach(b => {
      b.onclick = () => {
        const val = b.dataset.val === 'true';
        syncAnswer(state.currentPage, { type: 'truefalse', selected: val, correct: page.correct, explanation: page.explanation });
      };
    });
  }

  if (page.type === 'match') {
    let dragged = null;
    document.querySelectorAll('.draggable').forEach(d => {
      d.ondragstart = () => { dragged = d; d.classList.add('dragging'); };
      d.ondragend = () => d.classList.remove('dragging');
    });
    document.querySelectorAll('.drop-zone').forEach(z => {
      z.ondragover = (e) => { e.preventDefault(); z.classList.add('over'); };
      z.ondragleave = () => z.classList.remove('over');
      z.ondrop = (e) => {
        e.preventDefault();
        z.classList.remove('over');
        if (!dragged) return;
        const droppedEn = dragged.dataset.en;
        const isCorrect = droppedEn === z.dataset.correctEn;
        const matches = state.answers[state.currentPage]?.matches || {};
        matches[z.dataset.tr] = { en: droppedEn, correct: isCorrect };
        syncAnswer(state.currentPage, { type: 'match', matches });
      };
    });
  }

  if (page.type === 'image') {
    document.querySelectorAll('.clickable-spot').forEach(s => {
      s.onclick = () => {
        const idx = parseInt(s.dataset.idx);
        const correct = s.dataset.correct === 'true';
        syncAnswer(state.currentPage, { type: 'image', clicked: idx, correct });
      };
    });
  }

  if (page.type === 'writing') {
    const ta = document.getElementById('writing-input');
    let typingTimer;
    ta.addEventListener('input', () => {
      const text = ta.value;
      document.getElementById('word-count').textContent = `${text.trim().split(/\s+/).filter(Boolean).length} kelime`;
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => syncAnswer(state.currentPage, { type: 'writing', text }), 400);
    });
  }
}

// ====================================================================
// CEVAPLARI UI'A UYGULA
// ====================================================================
function applyAnswerToUI(pageIndex, ans) {
  if (pageIndex !== state.currentPage) return;
  const page = LESSON[pageIndex];

  if (ans.type === 'fill') {
    Object.entries(ans.values).forEach(([k, v]) => {
      const inp = document.querySelector(`.fill-input[data-blank="${k}"]`);
      if (inp && inp.value !== v) inp.value = v;
      if (inp && v.trim()) {
        const correct = v.trim().toLowerCase() === page.answers[k].toLowerCase();
        inp.classList.toggle('correct', correct);
        inp.classList.toggle('wrong', !correct);
      }
    });
  }

  if (ans.type === 'multiple') {
    document.querySelectorAll('.choice-btn').forEach((c, i) => {
      c.classList.remove('selected', 'correct', 'wrong');
      if (i === ans.selected) {
        c.classList.add(i === ans.correct ? 'correct' : 'wrong');
      } else if (i === ans.correct && ans.selected !== ans.correct) {
        c.classList.add('correct');
      }
    });
  }

  if (ans.type === 'truefalse') {
    document.querySelectorAll('.tf-btn').forEach(b => {
      b.classList.remove('selected-true', 'selected-false');
      const val = b.dataset.val === 'true';
      if (val === ans.selected) {
        b.classList.add(ans.correct === val ? 'selected-true' : 'selected-false');
      }
    });
    const fb = document.getElementById('tf-feedback');
    const isCorrect = ans.selected === ans.correct;
    fb.className = 'p-4 rounded-xl text-sm font-bold ' +
      (isCorrect ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
                 : 'bg-red-50 text-red-700 border border-red-200');
    fb.innerHTML = isCorrect
      ? '<i class="fa-solid fa-circle-check mr-2"></i> Doğru!'
      : `<i class="fa-solid fa-circle-xmark mr-2"></i> Yanlış. ${ans.explanation || ''}`;
  }

  if (ans.type === 'match' && ans.matches) {
    Object.entries(ans.matches).forEach(([tr, info]) => {
      const zone = document.querySelector(`.drop-zone[data-tr="${tr}"]`);
      if (!zone) return;
      zone.innerHTML = `
        <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg font-bold text-sm">${info.en}</span>
        <i class="fa-solid fa-arrow-right text-gray-400"></i>
        <span class="text-gray-700 font-medium">${tr}</span>
      `;
      zone.classList.remove('filled', 'wrong');
      if (info.correct) zone.classList.add('filled');
      else {
        zone.classList.add('wrong', 'shake');
        setTimeout(() => zone.classList.remove('shake'), 400);
      }
    });
  }

  if (ans.type === 'image') {
    const spot = document.querySelector(`.clickable-spot[data-idx="${ans.clicked}"]`);
    if (spot) spot.classList.add(ans.correct ? 'clicked-correct' : 'clicked-wrong');
  }

  if (ans.type === 'writing') {
    const ta = document.getElementById('writing-input');
    if (ta && ta.value !== ans.text) {
      ta.value = ans.text;
      document.getElementById('word-count').textContent = `${ans.text.trim().split(/\s+/).filter(Boolean).length} kelime`;
    }
  }
}

// ====================================================================
// SAYFA NAVİGASYONU
// ====================================================================
document.getElementById('next-btn').onclick = () => {
  if (state.currentPage < LESSON.length - 1) changePage(state.currentPage + 1);
};
document.getElementById('prev-btn').onclick = () => {

function showError(msg) {

// ====================================================================
// SECRET CODE — gizli klavye komutları (GTA tarzı)
// secenekb, secenekc, secenekd → layout değiştir
// seceneka → varsayılana dön
// ====================================================================
let secretBuffer = '';
const SECRET_TIMEOUT = 2000; // 2 saniye içinde tuşları arka arkaya bas
let secretTimer = null;

const LAYOUT_INFO = {
  'a': { name: 'A — Sağ kolon dikey', class: 'layout-a' },
  'b': { name: 'B — Sağ kolon 2×2 grid', class: 'layout-b' },
  'c': { name: 'C — Üstte yatay şerit', class: 'layout-c' },
  'd': { name: 'D — Konuşan büyür', class: 'layout-d' }
};

function applyLayout(letter, fromTeacher) {
  const info = LAYOUT_INFO[letter];
  if (!info) return;
  // Aynı layout zaten aktifse hiçbir şey yapma (sonsuz yayılım önlemi)
  if (document.body.classList.contains(info.class)) return;
  // Eski layout class'larını temizle
  document.body.classList.remove('layout-a', 'layout-b', 'layout-c', 'layout-d');
  document.body.classList.add(info.class);
  // Toast göster
  const toast = document.getElementById('secret-toast');
  if (fromTeacher) {
    toast.innerHTML = `<i class="fa-solid fa-chalkboard-user mr-2"></i> Öğretmen ekranı değiştirdi: ${info.name}`;
  } else {
    toast.textContent = `✨ Layout ${letter.toUpperCase()} aktif: ${info.name}`;
  }
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.addEventListener('keydown', (e) => {
  // SADECE ÖĞRETMENLER bu kodu kullanabilir
  if (state.role !== 'teacher') return;

  // Input/textarea içindeyken takip etme
  if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  // Modifier tuşları → atla
  if (e.ctrlKey || e.altKey || e.metaKey) return;

  // Sadece tek harf olan tuşları al
  const key = e.key;
  if (key.length !== 1 || !/[a-zA-Z]/.test(key)) return;

  secretBuffer += key.toLowerCase();
  if (secretBuffer.length > 30) secretBuffer = secretBuffer.slice(-30);

  clearTimeout(secretTimer);
  secretTimer = setTimeout(() => { secretBuffer = ''; }, SECRET_TIMEOUT);

  // Kontrol et — eşleşme bulunca Firebase'e yaz, herkese yayılacak
  for (const letter of ['a', 'b', 'c', 'd']) {
    if (secretBuffer.endsWith(`secenek${letter}`)) {
      console.log('[öğretmen layout değiştirdi]', letter);
      broadcastLayout(letter);
      secretBuffer = '';
      break;
    }
  }
});

// Öğretmen Firebase'e yazar → herkes onValue ile alır
async function broadcastLayout(letter) {
  if (!dbRoomRef) return;
  const { update } = window.fb;
  await update(dbRoomRef, { layout: letter });
}

// Sayfa açılınca varsayılan layout — A (Firebase bağlanınca öğretmenin seçtiği gelir)
(function initLayout() {
  document.body.classList.add(LAYOUT_INFO['a'].class);
})();

// Derse girince kontrol çubuğunu göster
