<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İngilizce Dersi - İnteraktif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
<script type="module">
  // Firebase v10 modular SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, update, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ====================================================================
  // 1. FIREBASE YAPILANDIRMASI - Buraya kendi config'ini yapıştır
  // ====================================================================
  const firebaseConfig = {
    apiKey: "BURAYA_API_KEY",
    authDomain: "PROJE.firebaseapp.com",
    databaseURL: "https://PROJE-default-rtdb.firebaseio.com",
    projectId: "PROJE-ID",
    storageBucket: "PROJE.appspot.com",
    messagingSenderId: "XXX",
    appId: "XXX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Tüm Firebase fonksiyonlarını global yap (script bloğundan erişmek için)
  window.fb = { db, ref, set, update, onValue, get, child };
</script>

<style>
  :root {
    --bg: #0a0a0f;
    --panel: #14141c;
    --panel-2: #1c1c28;
    --ink: #f5f0e8;
    --ink-dim: #9a9aa8;
    --accent: #ffb347;
    --accent-2: #6ee7d7;
    --correct: #4ade80;
    --wrong: #f87171;
    --line: rgba(255,255,255,0.08);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter Tight', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow: hidden;
    background-image:
      radial-gradient(at 80% 10%, rgba(255,179,71,0.08) 0px, transparent 50%),
      radial-gradient(at 10% 90%, rgba(110,231,215,0.06) 0px, transparent 50%);
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 64px 1fr 80px;
    grid-template-areas:
      "header header"
      "main cameras"
      "footer cameras";
    height: 100vh;
    gap: 16px;
    padding: 16px;
  }

  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: var(--panel);
    border-radius: 16px;
    border: 1px solid var(--line);
  }
  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 22px;
    font-style: italic;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  .role-badge {
    padding: 6px 14px;
    border-radius: 100px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .role-badge.teacher { color: var(--accent); border-color: rgba(255,179,71,0.3); }
  .role-badge.student { color: var(--accent-2); border-color: rgba(110,231,215,0.3); }

  main {
    grid-area: main;
    background: var(--panel);
    border-radius: 16px;
    border: 1px solid var(--line);
    padding: 48px 56px;
    overflow-y: auto;
    position: relative;
  }
  .page-tag {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .activity-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 38px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .activity-title em { color: var(--accent); font-style: italic; }
  .activity-instruction {
    color: var(--ink-dim);
    font-size: 16px;
    margin-bottom: 36px;
  }

  /* Kameralar */
  .cameras {
    grid-area: cameras;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cam-wrap {
    flex: 1;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--line);
  }
  .cam-label {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    z-index: 2;
  }
  .cam-wrap iframe, .cam-wrap video { width: 100%; height: 100%; }

  /* Footer kontrolleri */
  footer {
    grid-area: footer;
    background: var(--panel);
    border-radius: 16px;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .progress {
    flex: 1;
    margin: 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--panel-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 0.4s cubic-bezier(0.65, 0, 0.35, 1);
  }
  .page-count { font-family: var(--font-display); font-weight: 600; font-size: 18px; min-width: 70px; }
  .nav-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:hover:not(:disabled) { transform: translateY(-1px); }
  .nav-btn.secondary { background: var(--panel-2); color: var(--ink); border: 1px solid var(--line); }

  /* ============ ETKİNLİK STİLLERİ ============ */

  /* Boşluk doldurma */
  .fill-text {
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1.7;
    font-weight: 400;
  }
  .fill-input {
    display: inline-block;
    width: 140px;
    padding: 4px 10px;
    margin: 0 4px;
    background: var(--panel-2);
    border: none;
    border-bottom: 2px solid var(--accent);
    color: var(--ink);
    font-family: var(--font-display);
    font-size: 28px;
    text-align: center;
    transition: all 0.2s;
  }
  .fill-input:focus { outline: none; background: rgba(255,179,71,0.1); }
  .fill-input.correct { border-color: var(--correct); color: var(--correct); background: rgba(74,222,128,0.1); }
  .fill-input.wrong { border-color: var(--wrong); color: var(--wrong); background: rgba(248,113,113,0.1); }

  /* Çoktan seçmeli */
  .question { font-family: var(--font-display); font-size: 26px; line-height: 1.3; margin-bottom: 24px; font-weight: 500; }
  .choices { display: grid; gap: 12px; }
  .choice {
    padding: 18px 24px;
    background: var(--panel-2);
    border: 2px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 16px;
  }
  .choice:hover { border-color: var(--accent); transform: translateX(4px); }
  .choice .letter {
    width: 32px;
    height: 32px;
    background: var(--bg);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-family: var(--font-display);
    color: var(--accent);
  }
  .choice.selected { border-color: var(--accent); background: rgba(255,179,71,0.08); }
  .choice.correct { border-color: var(--correct); background: rgba(74,222,128,0.1); }
  .choice.correct .letter { color: var(--correct); }
  .choice.wrong { border-color: var(--wrong); background: rgba(248,113,113,0.1); }
  .choice.wrong .letter { color: var(--wrong); }

  /* True/False */
  .tf-statement { font-family: var(--font-display); font-size: 30px; line-height: 1.3; margin-bottom: 36px; font-style: italic; }
  .tf-buttons { display: flex; gap: 16px; }
  .tf-btn {
    flex: 1;
    padding: 28px;
    border-radius: 14px;
    border: 2px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tf-btn:hover { transform: scale(1.02); }
  .tf-btn[data-val="true"]:hover { border-color: var(--correct); }
  .tf-btn[data-val="false"]:hover { border-color: var(--wrong); }
  .tf-btn.selected[data-val="true"] { background: rgba(74,222,128,0.15); border-color: var(--correct); color: var(--correct); }
  .tf-btn.selected[data-val="false"] { background: rgba(248,113,113,0.15); border-color: var(--wrong); color: var(--wrong); }
  .tf-feedback { margin-top: 20px; font-size: 18px; font-family: var(--font-display); font-style: italic; }
  .tf-feedback.show.correct { color: var(--correct); }
  .tf-feedback.show.wrong { color: var(--wrong); }

  /* Sürükle-bırak eşleştirme */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .match-col { display: flex; flex-direction: column; gap: 12px; }
  .col-title { font-family: var(--font-display); font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-dim); margin-bottom: 8px; }
  .draggable {
    padding: 14px 18px;
    background: var(--panel-2);
    border: 2px solid var(--line);
    border-radius: 10px;
    cursor: grab;
    font-size: 16px;
    transition: all 0.15s;
  }
  .draggable:hover { border-color: var(--accent); }
  .draggable.dragging { opacity: 0.4; }
  .drop-zone {
    padding: 14px 18px;
    background: var(--bg);
    border: 2px dashed var(--line);
    border-radius: 10px;
    min-height: 50px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
  }
  .drop-zone .target-word { color: var(--ink-dim); font-style: italic; flex: 1; }
  .drop-zone.over { border-color: var(--accent); background: rgba(255,179,71,0.05); }
  .drop-zone.filled { border-style: solid; border-color: var(--correct); background: rgba(74,222,128,0.05); }
  .drop-zone .dropped { background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 6px; font-weight: 600; }

  /* Resme tıklama */
  .image-area {
    position: relative;
    background: linear-gradient(135deg, #2a2a3a, #1a1a24);
    border-radius: 12px;
    height: 360px;
    overflow: hidden;
    cursor: crosshair;
    border: 1px solid var(--line);
  }
  .scene { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 120px; }
  .clickable-spot {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clickable-spot:hover { border-color: var(--accent); background: rgba(255,179,71,0.15); }
  .clickable-spot.clicked.correct { border-color: var(--correct); background: rgba(74,222,128,0.25); }
  .clickable-spot.clicked.wrong { border-color: var(--wrong); background: rgba(248,113,113,0.25); }

  /* Yazma alanı */
  .writing-prompt { font-family: var(--font-display); font-style: italic; font-size: 22px; color: var(--ink-dim); margin-bottom: 16px; padding-left: 16px; border-left: 3px solid var(--accent); }
  .writing-area {
    width: 100%;
    min-height: 220px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 17px;
    line-height: 1.6;
    resize: vertical;
  }
  .writing-area:focus { outline: none; border-color: var(--accent); }
  .word-count { color: var(--ink-dim); font-size: 13px; margin-top: 8px; text-align: right; }

  /* Cursor başkasının (öğretmen/öğrenci) */
  .remote-cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s linear;
  }

  /* Lobi */
  .lobby {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 100;
  }
  .lobby h1 { font-family: var(--font-display); font-size: 64px; font-style: italic; font-weight: 800; letter-spacing: -0.03em; }
  .lobby h1 em { color: var(--accent); }
  .lobby input, .lobby select {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 14px 20px;
    border-radius: 10px;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    min-width: 320px;
  }
  .lobby button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 14px 36px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
  }

  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  .shake { animation: shake 0.3s; }
</style>
</head>
<body>

<!-- ============ LOBİ ============ -->
<div class="lobby" id="lobby">
  <h1>Ders<em>Akışı</em></h1>
  <select id="role-select">
    <option value="student">Öğrenci olarak gir</option>
    <option value="teacher">Öğretmen olarak gir</option>
  </select>
  <input id="name-input" type="text" placeholder="Adınız" value="">
  <input id="room-input" type="text" placeholder="Ders kodu (örn: ders-101)" value="ders-101">
  <button id="enter-btn">Derse Gir</button>
  <p style="color: var(--ink-dim); font-size: 13px; max-width: 400px; text-align: center;">
    Aynı ders kodunu kullanan öğretmen + öğrenciler aynı sınıfta buluşur. Tüm tıklamalar anlık olarak senkron.
  </p>
</div>

<!-- ============ ANA UYGULAMA ============ -->
<div class="app" id="app" style="display:none;">
  <header>
    <div class="logo">Ders<span>Akışı</span></div>
    <div id="role-badge" class="role-badge"></div>
  </header>

  <main id="activity-area">
    <!-- Etkinlikler buraya yüklenecek -->
  </main>

  <div class="cameras">
    <div class="cam-wrap" id="cam-student">
      <span class="cam-label">Öğrenci</span>
    </div>
    <div class="cam-wrap" id="cam-teacher">
      <span class="cam-label">Öğretmen</span>
    </div>
  </div>

  <footer>
    <button class="nav-btn secondary" id="prev-btn">← Önceki</button>
    <div class="progress">
      <span class="page-count" id="page-count">1 / 6</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <button class="nav-btn" id="next-btn">Sonraki →</button>
  </footer>
</div>

<script>
// ====================================================================
// DERS İÇERİĞİ - Buraya 20 sayfaya kadar etkinlik ekleyebilirsin
// ====================================================================
const LESSON = [
  {
    type: 'fill',
    title: 'Boşlukları <em>doldur</em>',
    instruction: 'Doğru fiil çekimini yazın',
    template: 'She ___ to school every day. He ___ coffee in the morning.',
    answers: ['goes', 'drinks']
  },
  {
    type: 'multiple',
    title: '<em>Doğru</em> cevabı seç',
    instruction: 'Aşağıdakilerden hangisi doğrudur?',
    question: 'What ___ you do yesterday?',
    choices: ['do', 'did', 'does', 'doing'],
    correct: 1
  },
  {
    type: 'truefalse',
    title: 'Doğru mu <em>yanlış</em> mı?',
    instruction: 'Cümleyi okuyun ve karar verin',
    statement: '"I have been to Paris three times last year" cümlesi gramer açısından doğrudur.',
    correct: false,
    explanation: 'Doğrusu: "I went to Paris three times last year" (geçmiş zaman ifadesi var)'
  },
  {
    type: 'match',
    title: 'Kelimeleri <em>eşleştir</em>',
    instruction: 'İngilizce kelimeleri Türkçe karşılıklarıyla eşleştirin',
    pairs: [
      { en: 'wonderful', tr: 'harika' },
      { en: 'difficult', tr: 'zor' },
      { en: 'expensive', tr: 'pahalı' },
      { en: 'comfortable', tr: 'rahat' }
    ]
  },
  {
    type: 'image',
    title: 'Resmi <em>incele</em>',
    instruction: 'Sahnedeki "the cat" üzerine tıklayın',
    emoji: '🌳 🐱 🏠 🚗',
    spots: [
      { x: '30%', y: '50%', correct: true, label: 'kedi' },
      { x: '10%', y: '40%', correct: false, label: 'ağaç' },
      { x: '55%', y: '50%', correct: false, label: 'ev' },
      { x: '78%', y: '55%', correct: false, label: 'araba' }
    ]
  },
  {
    type: 'writing',
    title: '<em>Yaz</em> bakalım',
    instruction: 'En sevdiğiniz mevsim hakkında 3-4 cümle yazın (İngilizce)',
    prompt: 'Tell me about your favourite season. Why do you like it?'
  }
];

// ====================================================================
// DURUM (state) - Firebase ile senkronize
// ====================================================================
let state = {
  role: null,       // 'teacher' veya 'student'
  name: '',
  room: '',
  currentPage: 0,
  answers: {}       // { pageIndex: cevap_verisi }
};

let dbRoomRef = null;

// ====================================================================
// LOBİYE GİRİŞ
// ====================================================================
document.getElementById('enter-btn').onclick = async () => {
  state.role = document.getElementById('role-select').value;
  state.name = document.getElementById('name-input').value.trim() || (state.role === 'teacher' ? 'Öğretmen' : 'Öğrenci');
  state.room = document.getElementById('room-input').value.trim() || 'ders-101';

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('app').style.display = 'grid';

  const badge = document.getElementById('role-badge');
  badge.textContent = state.role === 'teacher' ? '👨‍🏫 Öğretmen' : '🎓 Öğrenci';
  badge.classList.add(state.role);

  // Öğretmen değilse sayfa düğmelerini gizle
  if (state.role !== 'teacher') {
    document.getElementById('prev-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  }

  await setupFirebase();
  await setupVideo();
  renderActivity();
};

// ====================================================================
// FIREBASE SENKRON
// ====================================================================
async function setupFirebase() {
  const { db, ref, onValue, set, get } = window.fb;
  dbRoomRef = ref(db, `rooms/${state.room}`);

  // Oda yoksa başlangıç state'i yaz (sadece öğretmen)
  if (state.role === 'teacher') {
    const snap = await window.fb.get(dbRoomRef);
    if (!snap.exists()) {
      await set(dbRoomRef, { currentPage: 0, answers: {}, createdAt: Date.now() });
    }
  }

  // State değişikliklerini dinle
  onValue(dbRoomRef, (snap) => {
    const data = snap.val();
    if (!data) return;

    // Sayfa değiştiyse, herkesi senkron et
    if (data.currentPage !== state.currentPage) {
      state.currentPage = data.currentPage;
      renderActivity();
    }
    // Cevapları güncelle (UI üzerinde göster)
    if (data.answers && data.answers[state.currentPage]) {
      state.answers[state.currentPage] = data.answers[state.currentPage];
      applyAnswerToUI(state.currentPage, data.answers[state.currentPage]);
    }
  });
}

// Cevap yazma (her iki taraf da yazabilir, Firebase her şeyi yayar)
async function syncAnswer(pageIndex, answerData) {
  const { update } = window.fb;
  await update(dbRoomRef, { [`answers/${pageIndex}`]: answerData });
}

// Sayfa değiştirme (sadece öğretmen)
async function changePage(newPage) {
  const { update } = window.fb;
  await update(dbRoomRef, { currentPage: newPage });
}

// ====================================================================
// VIDEO (LiveKit) - Resmi, kart yok, ölçeklenebilir
// ====================================================================
async function setupVideo() {
  try {
    // 1. Backend'den token al
    const tokenRes = await fetch('/api/livekit-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        room: `super-english-${state.room}`,
        identity: `${state.role}-${state.name}-${Date.now()}`,
        name: state.name
      })
    });
    const data = await tokenRes.json();
    if (!data.token) {
      throw new Error(data.error || 'Token alınamadı');
    }

    // 2. LiveKit Room oluştur
    const room = new LivekitClient.Room({
      adaptiveStream: true,
      dynacast: true
    });

    // 3. Karşı taraftan video/ses geldiğinde
    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
      if (track.kind === 'video') {
        attachRemoteVideo(track, participant);
      } else if (track.kind === 'audio') {
        const audioEl = track.attach();
        audioEl.style.display = 'none';
        document.body.appendChild(audioEl);
      }
    });

    // 4. Bağlan
    await room.connect(data.wsUrl, data.token);

    // 5. Kendi kamera ve mikrofonunu aç
    await room.localParticipant.enableCameraAndMicrophone();

    // 6. Kendi videonu göster
    const pubs = Array.from(room.localParticipant.videoTrackPublications.values());
    if (pubs.length > 0 && pubs[0].track) {
      attachLocalVideo(pubs[0].track);
    }

    window.lkRoom = room;
    console.log('LiveKit bağlandı, oda:', `super-english-${state.room}`);
  } catch (e) {
    console.error('LiveKit hatası:', e);
    alert('Kamera başlatılamadı: ' + e.message);
  }
}

// Karşı tarafın videosunu doğru kutuya yerleştir
function attachRemoteVideo(track, participant) {
  const isTeacher = participant.identity.startsWith('teacher-');
  const targetId = isTeacher ? 'cam-teacher' : 'cam-student';
  const container = document.getElementById(targetId);
  container.querySelectorAll('video').forEach(v => v.remove());
  const videoEl = track.attach();
  videoEl.style.width = '100%';
  videoEl.style.height = '100%';
  videoEl.style.objectFit = 'cover';
  container.appendChild(videoEl);
}

// Kendi videonu kendi kutuna koy
function attachLocalVideo(track) {
  const targetId = state.role === 'teacher' ? 'cam-teacher' : 'cam-student';
  const container = document.getElementById(targetId);
  container.querySelectorAll('video').forEach(v => v.remove());
  const videoEl = track.attach();
  videoEl.style.width = '100%';
  videoEl.style.height = '100%';
  videoEl.style.objectFit = 'cover';
  videoEl.muted = true;
  container.appendChild(videoEl);
}

// ====================================================================
// ETKİNLİK RENDER
// ====================================================================
function renderActivity() {
  const page = LESSON[state.currentPage];
  const area = document.getElementById('activity-area');

  // İlerleme çubuğu
  document.getElementById('page-count').textContent = `${state.currentPage + 1} / ${LESSON.length}`;
  document.getElementById('progress-fill').style.width = `${((state.currentPage + 1) / LESSON.length) * 100}%`;
  document.getElementById('prev-btn').disabled = state.currentPage === 0;
  document.getElementById('next-btn').disabled = state.currentPage === LESSON.length - 1;

  let html = `
    <div class="page-tag">Sayfa ${state.currentPage + 1}</div>
    <h2 class="activity-title">${page.title}</h2>
    <p class="activity-instruction">${page.instruction}</p>
  `;

  if (page.type === 'fill') html += renderFill(page);
  if (page.type === 'multiple') html += renderMultiple(page);
  if (page.type === 'truefalse') html += renderTrueFalse(page);
  if (page.type === 'match') html += renderMatch(page);
  if (page.type === 'image') html += renderImage(page);
  if (page.type === 'writing') html += renderWriting(page);

  area.innerHTML = html;
  attachActivityListeners(page);

  // Önceki cevap varsa göster
  if (state.answers[state.currentPage]) {
    applyAnswerToUI(state.currentPage, state.answers[state.currentPage]);
  }
}

// === BOŞLUK DOLDURMA ===
function renderFill(page) {
  const parts = page.template.split('___');
  let html = '<div class="fill-text">';
  parts.forEach((part, i) => {
    html += part;
    if (i < parts.length - 1) {
      html += `<input class="fill-input" data-blank="${i}" type="text">`;
    }
  });
  html += '</div>';
  return html;
}

// === ÇOKTAN SEÇMELİ ===
function renderMultiple(page) {
  let html = `<div class="question">${page.question}</div><div class="choices">`;
  page.choices.forEach((c, i) => {
    html += `
      <div class="choice" data-idx="${i}">
        <span class="letter">${String.fromCharCode(65 + i)}</span>
        <span>${c}</span>
      </div>`;
  });
  html += '</div>';
  return html;
}

// === TRUE/FALSE ===
function renderTrueFalse(page) {
  return `
    <div class="tf-statement">"${page.statement}"</div>
    <div class="tf-buttons">
      <button class="tf-btn" data-val="true">✓ Doğru</button>
      <button class="tf-btn" data-val="false">✗ Yanlış</button>
    </div>
    <div class="tf-feedback" id="tf-feedback"></div>
  `;
}

// === EŞLEŞTİRME ===
function renderMatch(page) {
  // Karıştırılmış İngilizce kelimeler (sol) - Sabit Türkçe karşılıklar (sağ)
  const shuffled = [...page.pairs].sort(() => Math.random() - 0.5);
  let html = '<div class="match-grid"><div class="match-col"><div class="col-title">English</div>';
  shuffled.forEach(p => {
    html += `<div class="draggable" draggable="true" data-en="${p.en}">${p.en}</div>`;
  });
  html += '</div><div class="match-col"><div class="col-title">Türkçe</div>';
  page.pairs.forEach(p => {
    html += `
      <div class="drop-zone" data-tr="${p.tr}" data-correct-en="${p.en}">
        <span class="target-word">${p.tr}</span>
      </div>`;
  });
  html += '</div></div>';
  return html;
}

// === RESME TIKLAMA ===
function renderImage(page) {
  let html = `<div class="image-area"><div class="scene">${page.emoji}</div>`;
  page.spots.forEach((s, i) => {
    html += `<div class="clickable-spot" data-idx="${i}" data-correct="${s.correct}" style="left:${s.x};top:${s.y};"></div>`;
  });
  html += '</div>';
  return html;
}

// === YAZMA ===
function renderWriting(page) {
  return `
    <div class="writing-prompt">${page.prompt}</div>
    <textarea class="writing-area" id="writing-input" placeholder="Buraya yazın..."></textarea>
    <div class="word-count" id="word-count">0 kelime</div>
  `;
}

// ====================================================================
// ETKİNLİK OLAY DİNLEYİCİLERİ (her iki taraf da etkileşebilir)
// ====================================================================
function attachActivityListeners(page) {
  if (page.type === 'fill') {
    document.querySelectorAll('.fill-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const values = {};
        document.querySelectorAll('.fill-input').forEach(i => {
          values[i.dataset.blank] = i.value;
        });
        syncAnswer(state.currentPage, { type: 'fill', values });
      });
    });
  }

  if (page.type === 'multiple') {
    document.querySelectorAll('.choice').forEach(c => {
      c.onclick = () => {
        const idx = parseInt(c.dataset.idx);
        syncAnswer(state.currentPage, { type: 'multiple', selected: idx, correct: page.correct });
      };
    });
  }

  if (page.type === 'truefalse') {
    document.querySelectorAll('.tf-btn').forEach(b => {
      b.onclick = () => {
        const val = b.dataset.val === 'true';
        syncAnswer(state.currentPage, { type: 'truefalse', selected: val, correct: page.correct, explanation: page.explanation });
      };
    });
  }

  if (page.type === 'match') {
    let dragged = null;
    document.querySelectorAll('.draggable').forEach(d => {
      d.ondragstart = () => { dragged = d; d.classList.add('dragging'); };
      d.ondragend = () => d.classList.remove('dragging');
    });
    document.querySelectorAll('.drop-zone').forEach(z => {
      z.ondragover = (e) => { e.preventDefault(); z.classList.add('over'); };
      z.ondragleave = () => z.classList.remove('over');
      z.ondrop = (e) => {
        e.preventDefault();
        z.classList.remove('over');
        if (!dragged) return;
        const droppedEn = dragged.dataset.en;
        const isCorrect = droppedEn === z.dataset.correctEn;

        // Mevcut eşleşmeleri al ve güncelle
        const matches = state.answers[state.currentPage]?.matches || {};
        matches[z.dataset.tr] = { en: droppedEn, correct: isCorrect };
        syncAnswer(state.currentPage, { type: 'match', matches });
      };
    });
  }

  if (page.type === 'image') {
    document.querySelectorAll('.clickable-spot').forEach(s => {
      s.onclick = () => {
        const idx = parseInt(s.dataset.idx);
        const correct = s.dataset.correct === 'true';
        syncAnswer(state.currentPage, { type: 'image', clicked: idx, correct });
      };
    });
  }

  if (page.type === 'writing') {
    const ta = document.getElementById('writing-input');
    let typingTimer;
    ta.addEventListener('input', () => {
      const text = ta.value;
      document.getElementById('word-count').textContent = `${text.trim().split(/\s+/).filter(Boolean).length} kelime`;
      // Debounce: hızlı yazımda Firebase'i bombalama
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => syncAnswer(state.currentPage, { type: 'writing', text }), 400);
    });
  }
}

// ====================================================================
// CEVAPLARI UI'A UYGULA (Firebase'den gelen güncellemeler için)
// ====================================================================
function applyAnswerToUI(pageIndex, ans) {
  if (pageIndex !== state.currentPage) return;
  const page = LESSON[pageIndex];

  if (ans.type === 'fill') {
    Object.entries(ans.values).forEach(([k, v]) => {
      const inp = document.querySelector(`.fill-input[data-blank="${k}"]`);
      if (inp && inp.value !== v) inp.value = v;
      if (inp && v.trim()) {
        const correct = v.trim().toLowerCase() === page.answers[k].toLowerCase();
        inp.classList.toggle('correct', correct);
        inp.classList.toggle('wrong', !correct);
      }
    });
  }

  if (ans.type === 'multiple') {
    document.querySelectorAll('.choice').forEach((c, i) => {
      c.classList.remove('selected', 'correct', 'wrong');
      if (i === ans.selected) {
        c.classList.add(i === ans.correct ? 'correct' : 'wrong');
      } else if (i === ans.correct && ans.selected !== ans.correct) {
        c.classList.add('correct');
      }
    });
  }

  if (ans.type === 'truefalse') {
    document.querySelectorAll('.tf-btn').forEach(b => {
      b.classList.remove('selected');
      if ((b.dataset.val === 'true') === ans.selected) b.classList.add('selected');
    });
    const fb = document.getElementById('tf-feedback');
    const isCorrect = ans.selected === ans.correct;
    fb.textContent = isCorrect ? '✓ Doğru!' : `✗ Yanlış. ${ans.explanation || ''}`;
    fb.className = 'tf-feedback show ' + (isCorrect ? 'correct' : 'wrong');
  }

  if (ans.type === 'match' && ans.matches) {
    Object.entries(ans.matches).forEach(([tr, info]) => {
      const zone = document.querySelector(`.drop-zone[data-tr="${tr}"]`);
      if (!zone) return;
      zone.innerHTML = `<span class="dropped">${info.en}</span><span class="target-word">→ ${tr}</span>`;
      zone.classList.add('filled');
      if (!info.correct) {
        zone.classList.add('shake');
        setTimeout(() => zone.classList.remove('shake'), 400);
      }
    });
  }

  if (ans.type === 'image') {
    const spot = document.querySelector(`.clickable-spot[data-idx="${ans.clicked}"]`);
    if (spot) spot.classList.add('clicked', ans.correct ? 'correct' : 'wrong');
  }

  if (ans.type === 'writing') {
    const ta = document.getElementById('writing-input');
    if (ta && ta.value !== ans.text) {
      ta.value = ans.text;
      document.getElementById('word-count').textContent = `${ans.text.trim().split(/\s+/).filter(Boolean).length} kelime`;
    }
  }
}

// ====================================================================
// SAYFA NAVİGASYONU (sadece öğretmen)
// ====================================================================
document.getElementById('next-btn').onclick = () => {
  if (state.currentPage < LESSON.length - 1) changePage(state.currentPage + 1);
};
document.getElementById('prev-btn').onclick = () => {
  if (state.currentPage > 0) changePage(state.currentPage - 1);
};

</script>
